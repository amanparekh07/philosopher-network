<script>
const SCHOOLS = {
  "Ancient":        {color:"#f59e0b", label:"Ancient Philosophy"},
  "Medieval":       {color:"#a78bfa", label:"Medieval / Scholastic"},
  "Rationalism":    {color:"#34d399", label:"Rationalism"},
  "Empiricism":     {color:"#60a5fa", label:"British Empiricism"},

  "Existentialism": {color:"#fb923c", label:"Existentialism & Phenomenology"},
  "Analytic":       {color:"#22d3ee", label:"Analytic Philosophy"},
  "Continental":    {color:"#f472b6", label:"Continental Philosophy"},
  "Pragmatism":     {color:"#86efac", label:"Pragmatism"},
};

const philosophers = [
{id:"thales",name:"Thales of Miletus",born:-624,dates:"c. 624–548 BCE",school:"Ancient",
 works:["On Nature (lost)","Fragments in Diels-Kranz","Reports in Aristotle's Metaphysics","Herodotus's Histories","Diogenes Laërtius's Lives"],
 ideas:[{t:"Water as Arche",d:"All things originate from water — the first attempt to give a non-mythological, naturalistic account of the cosmos."},
        {t:"Father of Philosophy",d:"Tradition credits Thales as starting Western philosophy by seeking natural rather than divine explanations for phenomena."},
        {t:"Monism",d:"A single fundamental substance underlies all apparent diversity — the principle that drives all subsequent metaphysics."},
        {t:"Solar Eclipse Prediction",d:"Reportedly predicted the 585 BCE eclipse, demonstrating that nature follows discoverable regularities."},
        {t:"Everything Has Soul",d:"\"Everything is full of gods\" — a proto-panpsychist intuition that magnetism and living things share animation."}]},
{id:"pythagoras",name:"Pythagoras",born:-570,dates:"c. 570–495 BCE",school:"Ancient",
 works:["No surviving writings","Reports in Aristotle","Porphyry's Life of Pythagoras","Iamblichus's Life of Pythagoras","Diogenes Laërtius's Lives"],
 ideas:[{t:"Numbers as Reality",d:"The principles of mathematics are the principles of all things — the cosmos is fundamentally numerical structure."},
        {t:"Harmony of the Spheres",d:"Celestial bodies produce musical tones in motion; mathematics governs both music and the cosmos."},
        {t:"Metempsychosis",d:"The soul is immortal and transmigrates through different bodies — a doctrine influencing Plato's theory of the soul."},
        {t:"Mathematical Mysticism",d:"Numbers have qualitative characters (sacred tetraktys); mathematics is both science and religion."},
        {t:"Communal Philosophy",d:"Founded an intellectual and religious community at Croton — an early model for Plato's Academy."}]},
{id:"heraclitus",name:"Heraclitus",born:-535,dates:"c. 535–475 BCE",school:"Ancient",
 works:["On Nature (fragments only)","Fragments in Diels-Kranz","Marcus Aurelius's Meditations (quotations)","Clement of Alexandria (quotations)","Hippolytus (quotations)"],
 ideas:[{t:"Everything Flows",d:"\"You cannot step into the same river twice\" — reality is in perpetual flux; permanence is illusion."},
        {t:"The Logos",d:"An underlying rational principle (logos) governs all change and is accessible to reason, though most people are unaware of it."},
        {t:"Unity of Opposites",d:"Opposites are secretly identical — day/night, life/death, hot/cold are aspects of one unified process."},
        {t:"Fire as Arche",d:"Fire is the primal substance, because fire is always transforming — it best represents the dynamic nature of reality."},
        {t:"Obscure Sage",d:"Deliberately cryptic aphorisms earned him the nickname \"the Obscure\" — philosophy as provocation rather than system."}]},
{id:"parmenides",name:"Parmenides",born:-515,dates:"c. 515–450 BCE",school:"Ancient",
 works:["On Nature (poem, fragments)","Fragments in Diels-Kranz","Plato's Parmenides dialogue","Simplicius's Commentary","Aristotle's Physics (citations)"],
 ideas:[{t:"Being Is One",d:"What is, is; what is not, cannot be thought or spoken — Being is single, eternal, and unchanging."},
        {t:"Against Change",d:"Motion, plurality, and change are mere illusions of the senses; reason reveals a reality that cannot change."},
        {t:"Way of Truth vs Opinion",d:"Two paths: the way of truth (Being is one) vs the way of opinion (the apparent world of sense) — only the first is real."},
        {t:"First Pure Ontology",d:"The first philosopher to make Being itself (rather than its material substrate) the explicit object of inquiry."},
        {t:"Challenge to Pluralism",d:"His argument that plurality is impossible provoked Zeno's paradoxes and shaped Plato's defense of the Forms."}]},
{id:"democritus",name:"Democritus",born:-460,dates:"c. 460–370 BCE",school:"Ancient",
 works:["On the Nature of Things (lost)","Little World-System (lost)","Fragments in Diels-Kranz","Aristotle's On Generation (citations)","Diogenes Laërtius's Lives"],
 ideas:[{t:"Atoms and Void",d:"Reality consists of indivisible particles (atoms) moving through empty space — anticipating modern physics by two millennia."},
        {t:"Mechanistic Causation",d:"All events, including thought, result from the mechanical collision and arrangement of atoms — no teleology needed."},
        {t:"Secondary Qualities",d:"Colour, taste, and smell are conventional (\"by convention sweet, by nature atoms\") — only atoms and void are real."},
        {t:"Ethics of Contentment",d:"The goal of life is euthymia — contentment, equanimity — achieved through moderation and rational reflection."},
        {t:"Infinite Worlds",d:"An infinite universe contains infinite worlds, some with life, arising through natural processes — radical cosmological pluralism."}]},
{id:"socrates",name:"Socrates",born:-470,dates:"c. 470–399 BCE",school:"Ancient",
 works:["Apology (via Plato)","Crito (via Plato)","Phaedo (via Plato)","Symposium (via Plato)","Meno (via Plato)"],
 ideas:[{t:"Socratic Method",d:"Dialectical questioning that exposes contradictions and draws out latent knowledge — the foundational tool of philosophical inquiry."},
        {t:"Epistemic Humility",d:"\"I know that I know nothing\" — wisdom begins by honestly acknowledging the limits of one's own understanding."},
        {t:"Care of the Soul",d:"The examined life and moral virtue matter more than wealth, reputation, or political power."},
        {t:"Moral Intellectualism",d:"No one does evil knowingly — wrongdoing stems from ignorance; true knowledge of the good leads inevitably to virtuous action."},
        {t:"Piety and Civil Duty",d:"Accepted death rather than exile, honouring Athens's laws even as he critiqued them — philosophy as civic commitment."}]},
{id:"plato",name:"Plato",born:-428,dates:"c. 428–348 BCE",school:"Ancient",
 works:["The Republic","Phaedo","Symposium","Timaeus","Meno"],
 ideas:[{t:"Theory of Forms",d:"Abstract, perfect Forms are the true reality; the physical world is a shadow or imitation. The Form of the Good is supreme."},
        {t:"Philosopher Kings",d:"Ideal states should be governed by those who grasp eternal truths rather than chasing power or wealth."},
        {t:"Tripartite Soul",d:"The soul has rational, spirited, and appetitive parts; justice is their harmony, injustice their discord."},
        {t:"Anamnesis",d:"Learning is recollection — the soul possesses innate knowledge from a pre-birth existence and must be reminded of it."},
        {t:"Allegory of the Cave",d:"Most people mistake shadows for reality; philosophy liberates us to turn and see the sun — the source of truth."}]},
{id:"aristotle",name:"Aristotle",born:-384,dates:"384–322 BCE",school:"Ancient",
 works:["Nicomachean Ethics","Politics","Metaphysics","Organon (Logic)","Poetics"],
 ideas:[{t:"Eudaimonia",d:"Human flourishing (happiness) is the highest good, achieved through virtuous activity in accordance with reason over a complete life."},
        {t:"Virtue Ethics",d:"Virtues are stable character dispositions cultivated by habit, situated between vices of excess and deficiency (the golden mean)."},
        {t:"Hylomorphism",d:"Every substance is composed of matter (hyle) and form (morphe) inseparably — forms do not exist apart from things, contra Plato."},
        {t:"Syllogistic Logic",d:"Invented formal deductive logic, which dominated Western reasoning for over two thousand years."},
        {t:"Teleology",d:"Natural things have inherent purposes (telos) — understanding a thing fully means grasping what it is for."}]},
{id:"epicurus",name:"Epicurus",born:-341,dates:"341–270 BCE",school:"Ancient",
 works:["Letter to Menoeceus","Letter to Herodotus","Principal Doctrines","Vatican Sayings","On Nature (fragments)"],
 ideas:[{t:"Ataraxia",d:"The good life consists in tranquility (ataraxia) and freedom from bodily pain, not extravagant pleasure."},
        {t:"Atomism",d:"Everything, including the soul, is composed of atoms in void — no supernatural interference in human affairs."},
        {t:"Death is Nothing",d:"\"Where death is, I am not\" — fear of death is irrational since we never experience our own non-existence."},
        {t:"Friendship",d:"Friendship is the greatest of goods the wise person can acquire; the Epicurean Garden cultivated deep personal bonds."},
        {t:"Withdrawal",d:"\"Live hidden\" — avoid political ambition and its anxiety; prefer a quiet, self-sufficient community of friends."}]},
{id:"epictetus",name:"Epictetus",born:50,dates:"c. 50–135 CE",school:"Ancient",
 works:["Enchiridion","Discourses (via Arrian)","Fragments","Marcus Aurelius's Meditations (citations)","Simplicius's Commentary on the Enchiridion"],
 ideas:[{t:"Dichotomy of Control",d:"Some things are \"up to us\" (judgements, impulses) and some are not (body, reputation) — wisdom lies in accepting this distinction."},
        {t:"Stoic Freedom",d:"A slave can be freer than an emperor if his mind is governed by reason, not passion — inner freedom is the only true freedom."},
        {t:"Role Ethics",d:"We each play many roles (parent, citizen, human being); fulfilling each role excellently is the content of virtue."},
        {t:"Impressions and Assent",d:"We suffer not from events but from our judgements about them — suspend false assent and you suspend suffering."},
        {t:"Cosmopolitanism",d:"All humans share in the divine reason (logos); we are citizens of the world, not just our city or family."}]},
{id:"marcus-aurelius",name:"Marcus Aurelius",born:121,dates:"121–180 CE",school:"Ancient",
 works:["Meditations","Corpus of Imperial Rescripts","Fronto's Correspondence","Historia Augusta","Cassius Dio's Roman History"],
 ideas:[{t:"Stoic Practice",d:"Meditations is a private philosophical diary — philosophy as daily practice of the virtuous mind, not academic theory."},
        {t:"Impermanence",d:"All things pass; fame, empire, and life itself are transient — one should neither cling nor fear."},
        {t:"Virtue as the Only Good",d:"External goods (wealth, health, power) are indifferent; only virtue — rational, beneficent action — genuinely matters."},
        {t:"Universal Brotherhood",d:"All humans share reason and are bound together; injustice to any person harms the whole."},
        {t:"The Cosmic Perspective",d:"Adopt the view from above: from the cosmos, human ambitions look petty; equanimity follows from cosmic perspective."}]},
{id:"plotinus",name:"Plotinus",born:204,dates:"204–270 CE",school:"Ancient",
 works:["Enneads (ed. Porphyry)","On Beauty (Ennead I.6)","On the Good or the One (Ennead VI.9)","On Eternity and Time (Ennead III.7)","Against the Gnostics (Ennead II.9)"],
 ideas:[{t:"The One",d:"The ultimate principle (the One) transcends being and thought — it is the source from which everything emanates."},
        {t:"Emanation",d:"Reality flows outward: from the One comes Intellect (Nous), from Intellect comes Soul, from Soul comes matter — creation without effort or will."},
        {t:"Return to the One",d:"The soul's goal is to ascend back through contemplation to union with the One — mystical union as philosophical telos."},
        {t:"Beauty as Trace",d:"Beautiful things in the world are traces of the Good; beauty perceived rightly leads the soul upward toward its source."},
        {t:"Critique of Matter",d:"Matter is not evil in itself but the privation of form and goodness — evil is the absence of the Good, not a positive force."}]},
{id:"augustine",name:"Augustine of Hippo",born:354,dates:"354–430 CE",school:"Medieval",
 works:["Confessions","The City of God","On the Trinity","On Free Will","On Christian Doctrine"],
 ideas:[{t:"Original Sin & Grace",d:"Adam's fall corrupted human nature; divine grace, not unaided will, is necessary for salvation."},
        {t:"Two Cities",d:"History is a contest between the City of God (love of God) and the City of Man (love of self) — they are intertwined until the Last Judgement."},
        {t:"Restless Heart",d:"\"Our heart is restless until it finds rest in Thee\" — truth and peace are found only by turning inward and upward toward God."},
        {t:"Divine Illumination",d:"God illuminates the intellect directly, enabling us to grasp eternal truths — a Christianised Platonic epistemology."},
        {t:"Time and Creation",d:"Time itself began with creation; God exists outside time. Augustine's analysis anticipates modern philosophy of time."}]},
{id:"avicenna",name:"Avicenna (Ibn Sīnā)",born:980,dates:"980–1037",school:"Medieval",
 works:["The Book of Healing","The Canon of Medicine","The Book of Salvation","Floating Man thought experiment","Remarks and Admonitions"],
 ideas:[{t:"Floating Man Argument",d:"A man suspended in air, deprived of all sensation, would still be aware of his own existence — anticipating Descartes's cogito."},
        {t:"Islamic Aristotelianism",d:"Synthesised Aristotelian philosophy with Islamic theology, becoming the dominant philosophical framework of the medieval Islamic world."},
        {t:"Essence and Existence",d:"Essence does not include existence — God alone is the Necessary Being in whom essence and existence are identical."},
        {t:"Emanationist Cosmology",d:"Following Plotinus, the world emanates necessarily from God; the Active Intellect mediates between God and human minds."},
        {t:"Medical Philosophy",d:"Integrated Galenic medicine with Aristotelian natural philosophy; his Canon of Medicine dominated medicine for five centuries."}]},
{id:"anselm",name:"Anselm of Canterbury",born:1033,dates:"1033–1109",school:"Medieval",
 works:["Proslogion","Monologion","Cur Deus Homo","On Truth","On Free Will"],
 ideas:[{t:"Ontological Argument",d:"God is that than which nothing greater can be conceived; if God existed only in the mind, something greater could be conceived — so God must exist in reality."},
        {t:"Faith Seeking Understanding",d:"\"I believe in order to understand\" — faith is prior to reason, but reason can illuminate and support what faith already holds."},
        {t:"Necessary Being",d:"God's existence is logically necessary, not merely contingent — this modal claim about divinity shapes all subsequent theology."},
        {t:"Satisfaction Theory",d:"Christ's atonement satisfies the infinite offence of sin against God's honour — a rational account of the Incarnation."},
        {t:"Truth as Rightness",d:"Truth in propositions and actions consists in rightness — correspondence to God's rational order for things."}]},
{id:"aquinas",name:"Thomas Aquinas",born:1225,dates:"1225–1274",school:"Medieval",
 works:["Summa Theologiae","Summa Contra Gentiles","On Being and Essence","Disputed Questions on Truth","Commentary on Aristotle's Ethics"],
 ideas:[{t:"Five Ways",d:"Five cosmological arguments for God's existence: unmoved mover, first cause, contingency, degrees of perfection, and teleological design."},
        {t:"Faith and Reason",d:"Faith and reason are complementary — philosophy establishes preambles of faith; revelation discloses what surpasses reason."},
        {t:"Natural Law",d:"Moral law is grounded in reason and human nature; positive law derives its force from conformity with natural law."},
        {t:"Analogy of Being",d:"We speak of God meaningfully by analogy with creatures — avoiding both mystical silence and crude anthropomorphism."},
        {t:"Soul as Form",d:"Aristotle's hylomorphism applied to theology: the soul is the substantial form of the body, not a prisoner within it."}]},
{id:"scotus",name:"Duns Scotus",born:1266,dates:"c. 1266–1308",school:"Medieval",
 works:["Ordinatio","Lectura","Quodlibet","De Primo Principio","Questions on the Metaphysics of Aristotle"],
 ideas:[{t:"Haecceity",d:"Each individual thing has a \"thisness\" (haecceitas) — a non-qualitative principle of individuation irreducible to matter or form."},
        {t:"Univocity of Being",d:"\"Being\" is predicated univocally of God and creatures — Aquinas's analogy collapses the distinction needed for genuine theology."},
        {t:"Formal Distinction",d:"Between essence and existence, or between divine attributes, there is a real formal distinction less than numeric — a subtle metaphysical tool."},
        {t:"Voluntarism",d:"God's will is prior to God's intellect — what is good is good because God wills it, not the other way around."},
        {t:"Critique of Aquinas",d:"Systematically challenged Thomist positions on individuation, analogy, and the intellect — stimulating scholastic philosophy's finest debates."}]},
{id:"ockham",name:"William of Ockham",born:1287,dates:"c. 1287–1347",school:"Medieval",
 works:["Summa of Logic","Quodlibetal Questions","Ordinatio","Dialogue on Papal Power","Seven Quodlibets"],
 ideas:[{t:"Ockham's Razor",d:"\"Entities should not be multiplied beyond necessity\" — prefer the simplest explanation that saves the phenomena."},
        {t:"Nominalism",d:"Only individual things are real; universals (like \"humanity\") are merely mental concepts or names, not extra-mental entities."},
        {t:"Faith vs Reason",d:"Sharply separated theology and philosophy — faith rests on revelation, not on demonstrative proof; this limits natural theology."},
        {t:"Political Voluntarism",d:"Argued against Papal authority in secular matters; property rights and political authority rest on human convention, not divine institution."},
        {t:"Intuitive Cognition",d:"Primary knowledge is direct intuitive acquaintance with individuals, not abstract reasoning from universals."}]},
{id:"bacon-f",name:"Francis Bacon",born:1561,dates:"1561–1626",school:"Empiricism",
 works:["Novum Organum","The Advancement of Learning","New Atlantis","Essays","History of Henry VII"],
 ideas:[{t:"Inductive Method",d:"Science progresses by systematic observation and induction, not deduction from first principles — a direct challenge to Aristotelianism."},
        {t:"Four Idols",d:"Four sources of error: the Tribe (human nature), Cave (individual bias), Marketplace (language), Theatre (received philosophies)."},
        {t:"Knowledge is Power",d:"\"Scientia est potentia\" — the purpose of natural philosophy is to master and improve nature for human benefit."},
        {t:"Reform of Learning",d:"Proposed a wholesale reform of the entire curriculum of human knowledge — the blueprint for modern science."},
        {t:"Natural History",d:"Called for systematic empirical natural histories as the foundation on which future science must be built."}]},
{id:"hobbes",name:"Thomas Hobbes",born:1588,dates:"1588–1679",school:"Political",
 works:["Leviathan","De Cive","De Corpore","Behemoth","Elements of Law"],
 ideas:[{t:"State of Nature",d:"Without government, life would be \"solitary, poor, nasty, brutish, and short\" — a war of all against all."},
        {t:"Social Contract",d:"Rational individuals surrender natural liberty to a sovereign in exchange for security and civil peace."},
        {t:"Materialism",d:"Everything, including the mind, is matter in motion — thought is nothing but internal motion in the brain."},
        {t:"Sovereign Authority",d:"The sovereign's commands are law; subjects have no right to rebel so long as the sovereign protects their security."},
        {t:"Natural Law",d:"Natural laws are rational precepts of peace discovered by reason but not truly binding without a sovereign to enforce them."}]},
{id:"descartes",name:"René Descartes",born:1596,dates:"1596–1650",school:"Rationalism",
 works:["Meditations on First Philosophy","Discourse on the Method","Principles of Philosophy","The Passions of the Soul","Rules for the Direction of the Mind"],
 ideas:[{t:"Cogito Ergo Sum",d:"\"I think, therefore I am\" — the one indubitable certainty surviving methodic doubt, the Archimedean point of modern philosophy."},
        {t:"Mind-Body Dualism",d:"Mind (res cogitans) and body (res extensa) are wholly distinct substances — this set the mind-body problem."},
        {t:"Methodic Doubt",d:"Systematically reject every belief that can possibly be doubted in order to find a secure foundation for knowledge."},
        {t:"Clear and Distinct Ideas",d:"Whatever is perceived clearly and distinctly is true — the Cartesian criterion for certainty."},
        {t:"Mechanistic Nature",d:"The physical world, including animal bodies, operates as a machine according to mathematical-mechanical laws."}]},
{id:"malebranche",name:"Nicolas Malebranche",born:1638,dates:"1638–1715",school:"Rationalism",
 works:["The Search After Truth","Treatise on Nature and Grace","Dialogues on Metaphysics","Christian and Metaphysical Meditations","Treatise on Ethics"],
 ideas:[{t:"Occasionalism",d:"God is the only true cause — when a billiard ball strikes another, God causes the second to move on the occasion of the first."},
        {t:"Vision in God",d:"We see all things in God — ideas are the divine essence itself, insofar as it represents finite creatures to us."},
        {t:"Critique of Cartesian Causation",d:"Descartes left the mind-body interaction mysterious; occasionalism resolves it by eliminating finite causation entirely."},
        {t:"Error as Consent",d:"Intellectual error arises when the will consents to unclear ideas — a moral failure as much as an epistemic one."},
        {t:"Theodicy",d:"God acts by general volitions (laws of nature), not particular miracles — grace and nature both follow universal rules."}]},
{id:"spinoza",name:"Baruch Spinoza",born:1632,dates:"1632–1677",school:"Rationalism",
 works:["Ethics (Geometrical Order)","Theologico-Political Treatise","On the Improvement of the Understanding","Political Treatise","Principles of Cartesian Philosophy"],
 ideas:[{t:"Deus sive Natura",d:"There is only one substance — God, identical with Nature. Everything else is a mode (modification) of this single infinite substance."},
        {t:"Strict Determinism",d:"All events follow necessarily from the nature of substance — what feels like free will is merely ignorance of causes."},
        {t:"Conatus",d:"Every thing strives to persist in its own being (conatus); this striving is the very essence of that thing."},
        {t:"Intellectual Love of God",d:"Human freedom consists in understanding necessity and thereby achieving the highest blessedness — amor intellectualis Dei."},
        {t:"Biblical Criticism",d:"The Bible is a human, historically conditioned document; one of the first systematic works of modern scriptural criticism."}]},
{id:"leibniz",name:"G.W. Leibniz",born:1646,dates:"1646–1716",school:"Rationalism",
 works:["Monadology","Discourse on Metaphysics","New Essays on Human Understanding","Theodicy","Correspondence with Clarke"],
 ideas:[{t:"Monads",d:"Reality consists of simple, immaterial substances (monads), each a windowless mirror reflecting the entire universe from its own perspective."},
        {t:"Pre-established Harmony",d:"God set mind and body running in perfect parallel harmony — they appear to interact but never causally do."},
        {t:"Best of All Possible Worlds",d:"God necessarily created the best possible world; evil is a necessary feature of the optimal overall whole."},
        {t:"Principle of Sufficient Reason",d:"Nothing occurs without a sufficient reason why it is so and not otherwise — a foundational principle of rational metaphysics."},
        {t:"Logic and Calculus",d:"Co-invented calculus and dreamed of a universal logical language that would settle all disputes by calculation."}]},
{id:"locke",name:"John Locke",born:1632,dates:"1632–1704",school:"Empiricism",
 works:["Essay Concerning Human Understanding","Two Treatises of Government","A Letter Concerning Toleration","Some Thoughts Concerning Education","The Reasonableness of Christianity"],
 ideas:[{t:"Tabula Rasa",d:"The mind begins as a blank slate; all knowledge derives from sensory experience and reflection, not innate ideas."},
        {t:"Natural Rights",d:"Individuals possess inalienable rights to life, liberty, and property that precede and constrain civil government."},
        {t:"Social Contract",d:"Legitimate government rests on the consent of the governed; revolution is justified when rulers betray their trust."},
        {t:"Primary/Secondary Qualities",d:"Shape and motion are in objects (primary); colour and taste are mind-dependent responses (secondary)."},
        {t:"Religious Toleration",d:"Civil authority has no jurisdiction over sincere religious conviction — the case for separation of church and state."}]},
{id:"berkeley",name:"George Berkeley",born:1685,dates:"1685–1753",school:"Empiricism",
 works:["A Treatise Concerning the Principles of Human Knowledge","Three Dialogues between Hylas and Philonous","Essay towards a New Theory of Vision","Siris","Alciphron"],
 ideas:[{t:"Esse est Percipi",d:"To be is to be perceived — material objects do not exist independently of minds; there is no matter, only minds and their ideas."},
        {t:"Immaterialism",d:"Matter is a philosophical fiction; the common-sense world is entirely real, but it consists of ideas in minds."},
        {t:"God as Universal Perceiver",d:"Physical objects continue to exist when unperceived by us because God continuously perceives them."},
        {t:"Critique of Abstract Ideas",d:"Locke's abstract general ideas are impossible — genuine ideas are always particular; \"triangle in general\" is incoherent."},
        {t:"Against Scepticism",d:"Immaterialism is not scepticism but its cure — by removing the unknowable external matter, sceptical doubts disappear."}]},
{id:"hume",name:"David Hume",born:1711,dates:"1711–1776",school:"Empiricism",
 works:["A Treatise of Human Nature","Enquiry Concerning Human Understanding","Enquiry Concerning the Principles of Morals","Dialogues Concerning Natural Religion","The History of England"],
 ideas:[{t:"Bundle Theory of Self",d:"The self is not a unified substance but a bundle of perceptions — introspection never reveals a stable \"I\" behind experience."},
        {t:"Problem of Induction",d:"Inductive inference has no rational justification; confidence in regularities is a matter of psychological habit, not reason."},
        {t:"Is-Ought Gap",d:"Moral conclusions cannot be validly derived from purely factual premises alone — the foundational fact-value distinction."},
        {t:"Critique of Causation",d:"We never perceive necessary connection — only constant conjunction. Causation is a projection of the mind onto experience."},
        {t:"Critique of Natural Theology",d:"In the Dialogues, Hume demolishes the design argument, leaving natural religion without rational foundations."}]},
{id:"kant",name:"Immanuel Kant",born:1724,dates:"1724–1804",school:"Idealism",
 works:["Critique of Pure Reason","Critique of Practical Reason","Critique of the Power of Judgment","Groundwork of the Metaphysics of Morals","Prolegomena to Any Future Metaphysics"],
 ideas:[{t:"Copernican Revolution",d:"Objects conform to our cognitive faculties, not vice versa — we actively impose space, time, and categories on experience."},
        {t:"Categorical Imperative",d:"Act only on maxims you could will to be universal laws; always treat persons as ends in themselves, never merely as means."},
        {t:"Synthetic A Priori",d:"Some truths are both non-trivial (synthetic) and knowable independently of experience (a priori) — e.g. mathematics and causal laws."},
        {t:"Phenomena / Noumena",d:"We can know things only as they appear through our faculties (phenomena); things-in-themselves (noumena) are unknowable."},
        {t:"Autonomy",d:"Moral law is self-given by rational agents; autonomy (self-legislation of reason) is the ground of human dignity and rights."}]},
{id:"rousseau",name:"J.-J. Rousseau",born:1712,dates:"1712–1778",school:"Political",
 works:["Discourse on Inequality","The Social Contract","Émile, or On Education","Confessions","Julie, or the New Héloïse"],
 ideas:[{t:"Natural Goodness",d:"Human beings are naturally good; civilisation, private property, and social comparison corrupt them and produce inequality."},
        {t:"General Will",d:"Legitimate political authority expresses the general will — the common good — rather than the sum of private interests."},
        {t:"Natural Education",d:"Children should be educated in accordance with nature, shielded from social corruption until reason is mature."},
        {t:"Amour-Propre",d:"Healthy self-love (amour de soi) differs from corrosive vanity (amour-propre) — comparing oneself to others breeds misery."},
        {t:"Popular Sovereignty",d:"Sovereignty belongs inalienably to the people and cannot be delegated to representatives or monarchs."}]},
{id:"wollstonecraft",name:"Mary Wollstonecraft",born:1759,dates:"1759–1797",school:"Political",
 works:["A Vindication of the Rights of Woman","A Vindication of the Rights of Men","Maria: or, The Wrongs of Woman","Thoughts on the Education of Daughters","A Historical and Moral View of the French Revolution"],
 ideas:[{t:"Women's Rational Equality",d:"Women are rational beings fully equal to men; apparent differences are products of deficient education, not natural inferiority."},
        {t:"Education as Liberation",d:"Equal rational education for women is essential for civic virtue, genuine friendship in marriage, and self-determination."},
        {t:"Critique of Sensibility",d:"Rousseau's idealisation of feminine sensibility is patronising; reason, not sentiment, should guide women and men alike."},
        {t:"Rights are Universal",d:"The rights proclaimed in the Enlightenment must extend to women; no principled line can exclude them."},
        {t:"Economic Independence",d:"Women must be capable of supporting themselves; dependence on male protection corrupts both character and society."}]},
{id:"bentham",name:"Jeremy Bentham",born:1748,dates:"1748–1832",school:"Political",
 works:["Introduction to the Principles of Morals and Legislation","A Fragment on Government","Panopticon","Rationale of Judicial Evidence","Constitutional Code"],
 ideas:[{t:"Principle of Utility",d:"Actions are right insofar as they promote happiness (pleasure) and prevent pain — the single moral standard."},
        {t:"Hedonic Calculus",d:"Pleasures and pains can be calculated by intensity, duration, certainty, proximity, fecundity, and purity to determine moral choices."},
        {t:"Panopticon",d:"A circular prison design where inmates are always potentially observed — a metaphor for disciplinary power."},
        {t:"Legal Reform",d:"Utilitarianism applied to law: legal codes should be rewritten to maximise aggregate happiness and minimise suffering."},
        {t:"Felicific Democracy",d:"Government's purpose is the greatest happiness of the greatest number — the slogan that launched the reform movement."}]},
{id:"hegel",name:"G.W.F. Hegel",born:1770,dates:"1770–1831",school:"Idealism",
 works:["Phenomenology of Spirit","Science of Logic","Elements of the Philosophy of Right","Encyclopedia of the Philosophical Sciences","Lectures on the Philosophy of History"],
 ideas:[{t:"Dialectic",d:"Reality unfolds through contradiction: a position (thesis) generates its negation (antithesis), which is superseded in a higher unity (Aufhebung)."},
        {t:"Absolute Spirit",d:"Reality is Spirit (Geist) coming to full self-knowledge through nature, history, art, religion, and philosophy."},
        {t:"Master-Slave Dialectic",d:"Self-consciousness requires recognition from another; the struggle for recognition shapes all social and historical life."},
        {t:"History as Progress",d:"History is the progressive actualisation of freedom; each era is a necessary stage in Spirit's self-understanding."},
        {t:"Sittlichkeit",d:"Concrete ethical life — family, civil society, the state — grounds and supersedes abstract individual morality (Moralität)."}]},
{id:"schopenhauer",name:"Schopenhauer",born:1788,dates:"1788–1860",school:"Idealism",
 works:["The World as Will and Representation","On the Basis of Morality","The Two Fundamental Problems of Ethics","Parerga and Paralipomena","On the Fourfold Root"],
 ideas:[{t:"Will as Thing-in-Itself",d:"Behind all appearances lies a blind, striving, irrational Will — the Kantian thing-in-itself, not a benevolent rational deity."},
        {t:"Pessimism",d:"Existence is fundamentally suffering — desire is insatiable; satisfaction breeds boredom; life oscillates between pain and tedium."},
        {t:"Art as Escape",d:"Aesthetic contemplation, especially music, temporarily suspends the tyranny of willing and offers genuine peace."},
        {t:"Ascetic Denial",d:"The wisest path is denial of the will to live: asceticism, compassion, and renunciation overcome existence from within."},
        {t:"Compassion as Ethics",d:"Morality is grounded in compassion (Mitleid) — genuine feeling of another's suffering as one's own, dissolving the illusion of separation."}]},
{id:"mill",name:"John Stuart Mill",born:1806,dates:"1806–1873",school:"Political",
 works:["Utilitarianism","On Liberty","The Subjection of Women","A System of Logic","Principles of Political Economy"],
 ideas:[{t:"Higher Pleasures",d:"\"It is better to be Socrates dissatisfied than a fool satisfied\" — quality of pleasures matters, not just quantity."},
        {t:"Harm Principle",d:"The only legitimate reason to restrict individual freedom is to prevent harm to others — the cornerstone of liberal politics."},
        {t:"Representative Government",d:"Democracy is the best form of government because it best develops the capacities of citizens and prevents abuse of power."},
        {t:"Subjection of Women",d:"The legal subordination of women is a relic of primitive force, with no rational justification — a proto-feminist argument."},
        {t:"Liberty of Thought",d:"Freedom of expression, even of false opinions, is necessary for the \"marketplace of ideas\" to produce truth over time."}]},
{id:"kierkegaard",name:"Kierkegaard",born:1813,dates:"1813–1855",school:"Existentialism",
 works:["Either/Or","Fear and Trembling","The Concept of Anxiety","Concluding Unscientific Postscript","The Sickness Unto Death"],
 ideas:[{t:"Stages of Existence",d:"Three spheres: the aesthetic (pleasure), the ethical (duty), and the religious (passionate faith) — each supersedes the last."},
        {t:"Leap of Faith",d:"Genuine religious faith requires a passionate subjective leap beyond reason — it cannot be rationally justified."},
        {t:"Subjectivity is Truth",d:"Existential truth is found in passionate first-person commitment, not detached objective systems."},
        {t:"Anxiety and Despair",d:"Anxiety is the dizziness of freedom before infinite possibility; despair is the failure to become oneself — the fundamental human sickness."},
        {t:"Against Hegel",d:"Systematic philosophy falsifies existence by absorbing the individual into the Absolute. The existing individual cannot be captured in concepts."}]},
{id:"marx",name:"Karl Marx",born:1818,dates:"1818–1883",school:"Political",
 works:["The Communist Manifesto (with Engels)","Capital (Das Kapital)","Economic and Philosophic Manuscripts of 1844","The German Ideology","Theses on Feuerbach"],
 ideas:[{t:"Historical Materialism",d:"History is driven by material conditions and class struggle, not ideas; the mode of production determines the social superstructure."},
        {t:"Alienation",d:"Under capitalism, workers are alienated from their labour, its products, their species-being, and each other."},
        {t:"Base and Superstructure",d:"The economic base (relations and forces of production) conditions the ideological, legal, and cultural superstructure."},
        {t:"Class Struggle",d:"\"The history of all hitherto existing society is the history of class struggles.\" Capitalism produces its own gravediggers in the proletariat."},
        {t:"Surplus Value",d:"Capitalists extract surplus value by paying workers less than the full value they produce — this unpaid labour is the source of profit."}]},
{id:"brentano",name:"Franz Brentano",born:1838,dates:"1838–1917",school:"Existentialism",
 works:["Psychology from an Empirical Standpoint","On the Origin of Our Knowledge of Right and Wrong","Descriptive Psychology","The True and the Evident","Aristotle and His World View"],
 ideas:[{t:"Intentionality",d:"The mark of the mental is intentionality — all mental acts are directed toward objects (\"aboutness\") — reintroducing this concept to modern philosophy."},
        {t:"Act Psychology",d:"Psychology should study mental acts (believing, judging, loving) rather than mental contents — a shift from Locke's passivity."},
        {t:"Inner Perception",d:"We have direct, self-evident inner perception of our own mental acts — a form of certainty that grounds empirical psychology."},
        {t:"Value Theory",d:"Correct emotional response to objects grounds value judgements — ethics is based on the phenomenology of preferring and loving."},
        {t:"Teacher of Husserl",d:"His descriptive psychology and concept of intentionality became the direct foundation for Husserl's phenomenology."}]},
{id:"nietzsche",name:"Nietzsche",born:1844,dates:"1844–1900",school:"Existentialism",
 works:["Thus Spoke Zarathustra","Beyond Good and Evil","On the Genealogy of Morality","The Birth of Tragedy","The Gay Science"],
 ideas:[{t:"God is Dead",d:"The death of God signals the collapse of transcendent value and the onset of nihilism — a cultural crisis requiring new values."},
        {t:"Will to Power",d:"The fundamental drive in life is not self-preservation but expansion, creativity, and mastery — the will to power."},
        {t:"Eternal Recurrence",d:"Could you affirm your life if you had to live it again, infinitely? The thought as existential litmus test."},
        {t:"Übermensch",d:"The overman creates new values in place of collapsed religious morality — the goal of human self-overcoming beyond the herd."},
        {t:"Master/Slave Morality",d:"Slave morality (Christianity, socialism) inverts noble values through resentment (ressentiment); we must revalue all values from strength."}]},
{id:"frege",name:"Frege",born:1848,dates:"1848–1925",school:"Analytic",
 works:["Begriffsschrift","The Foundations of Arithmetic","Basic Laws of Arithmetic","\"On Sense and Reference\"","\"Thought: A Logical Inquiry\""],
 ideas:[{t:"Logicism",d:"Arithmetic is reducible to pure logic — numbers are logical objects and arithmetical truths are logical truths."},
        {t:"Sense and Reference",d:"A name has both a sense (Sinn: mode of presentation) and a reference (Bedeutung: the object). \"Morning star\" and \"evening star\" share reference but differ in sense."},
        {t:"Predicate Logic",d:"Invented modern formal logic with quantifiers (∀, ∃) and function-argument structure, replacing Aristotelian syllogistics."},
        {t:"Context Principle",d:"A word has meaning only in the context of a proposition — anticipating later holistic views of meaning."},
        {t:"Anti-Psychologism",d:"Logical laws are objective and mind-independent; the validity of an inference is not a psychological fact about how humans reason."}]},
{id:"peirce",name:"C.S. Peirce",born:1839,dates:"1839–1914",school:"Pragmatism",
 works:["\"How to Make Our Ideas Clear\"","\"The Fixation of Belief\"","Collected Papers (posthumous)","\"What Pragmatism Is\"","\"A Guess at the Riddle\""],
 ideas:[{t:"Pragmatic Maxim",d:"The meaning of an idea is exhausted by its conceivable practical consequences — if an idea has no practical import, it has no meaning."},
        {t:"Fallibilism",d:"No belief is beyond revision; science proceeds by tentative hypotheses subject to correction — certainty is not the goal."},
        {t:"Semiotics",d:"Founded modern semiotics: all thought is in signs; sign, object, and interpretant form the irreducible structure of meaning."},
        {t:"Abduction",d:"Alongside deduction and induction, identified abduction (inference to the best explanation) as a basic mode of scientific reasoning."},
        {t:"Synechism",d:"Reality is characterised by continuity — the principle that there are no absolute discontinuities in nature, time, or mind."}]},
{id:"bergson",name:"Henri Bergson",born:1859,dates:"1859–1941",school:"Continental",
 works:["Time and Free Will","Matter and Memory","Creative Evolution","The Two Sources of Morality and Religion","An Introduction to Metaphysics"],
 ideas:[{t:"Duration",d:"Real time (durée) is lived experience — a continuous flow irreducible to the spatial, quantitative \"clock time\" of physics."},
        {t:"Élan Vital",d:"Life is driven by a creative vital impulse (élan vital) that cannot be explained by mechanistic or teleological principles alone."},
        {t:"Intuition vs Intellect",d:"Intellect analyses and spatialises; intuition alone grasps the flowing reality of life from within."},
        {t:"Memory",d:"Pure memory (not habit) is immaterial; the past is preserved whole and becomes present through recollection — influencing Proust."},
        {t:"Open Morality",d:"Morality comes in two forms: closed (tribal, social pressure) and open (creative, universal love) — religion can inspire the latter."}]},
{id:"husserl",name:"Husserl",born:1859,dates:"1859–1938",school:"Existentialism",
 works:["Logical Investigations","Ideas I (Pure Phenomenology)","Cartesian Meditations","The Crisis of European Sciences","On Internal Time-Consciousness"],
 ideas:[{t:"Intentionality",d:"Consciousness is always consciousness of something — it is essentially directed toward objects. There is no experience without an object."},
        {t:"Epoché / Reduction",d:"\"Bracket\" the natural attitude's naive acceptance of the external world to examine the pure structure of consciousness itself."},
        {t:"Lifeworld",d:"The pre-theoretical lived world (Lebenswelt) is the forgotten foundation on which all science and theory is built."},
        {t:"Eidetic Reduction",d:"By imaginatively varying features of an experience, we can identify its invariant essence (eidos) — a method for a priori description."},
        {t:"Intersubjectivity",d:"The constitution of a shared objective world requires understanding other subjects. The problem of the other became central to all phenomenology."}]},
{id:"dewey",name:"John Dewey",born:1859,dates:"1859–1952",school:"Pragmatism",
 works:["Democracy and Education","Experience and Nature","The Quest for Certainty","Logic: The Theory of Inquiry","Art as Experience"],
 ideas:[{t:"Instrumentalism",d:"Ideas are tools for solving problems — truth is not a static correspondence but the successful outcome of inquiry."},
        {t:"Education as Growth",d:"Education is not preparation for life but life itself; genuine growth involves continuous reconstruction of experience."},
        {t:"Democracy as Way of Life",d:"Democracy is not just a form of government but a mode of associated living — cooperative inquiry applied to social problems."},
        {t:"Naturalism",d:"All knowledge, including moral knowledge, is continuous with natural science — no sharp divide between fact and value."},
        {t:"Anti-Dualism",d:"Systematically dismantled traditional dualisms: mind/body, theory/practice, individual/society, art/science."}]},
{id:"moore",name:"G.E. Moore",born:1873,dates:"1873–1958",school:"Analytic",
 works:["Principia Ethica","\"A Defence of Common Sense\"","\"The Refutation of Idealism\"","Some Main Problems of Philosophy","Philosophical Studies"],
 ideas:[{t:"Open Question Argument",d:"\"Is goodness identical to pleasure?\" always remains an open question — so goodness cannot be defined in naturalistic terms."},
        {t:"Naturalistic Fallacy",d:"Any attempt to define \"good\" in terms of natural properties commits a fallacy — good is a simple, indefinable, non-natural property."},
        {t:"Common Sense Philosophy",d:"\"I know I have two hands\" — common-sense beliefs about the external world have a greater certainty than sceptical philosophical hypotheses."},
        {t:"Refutation of Idealism",d:"Demolished Bradley's British Idealism by showing consciousness cannot be identified with its objects — esse is not percipi."},
        {t:"Sense-Data Theory",d:"What we directly perceive are sense-data (surfaces of tables, colours) — the problem of perception concerns their relation to objects."}]},
{id:"james",name:"William James",born:1842,dates:"1842–1910",school:"Pragmatism",
 works:["The Principles of Psychology","Pragmatism","The Will to Believe","The Varieties of Religious Experience","Essays in Radical Empiricism"],
 ideas:[{t:"Pragmatic Truth",d:"A belief is true if it works — if believing it leads to satisfactory consequences when acted upon."},
        {t:"Stream of Consciousness",d:"Mental life is a continuous flow, not discrete elements — the metaphor that transformed psychology and literature."},
        {t:"Radical Empiricism",d:"Relations between things are as real as the things themselves; pure experience is the fundamental stuff of the world."},
        {t:"Will to Believe",d:"In live, forced, momentous questions without evidence, we are entitled to commit to the more life-affirming option."},
        {t:"Pluralism",d:"Reality is genuinely plural, incomplete, and open — there is no single closed rational system. The universe may be a \"multiverse.\""}]},
{id:"carnap",name:"Rudolf Carnap",born:1891,dates:"1891–1970",school:"Analytic",
 works:["The Logical Structure of the World","The Logical Syntax of Language","\"Empiricism, Semantics, and Ontology\"","Meaning and Necessity","Logical Foundations of Probability"],
 ideas:[{t:"Principle of Verification",d:"A statement is meaningful only if it is analytic or verifiable by experience — metaphysics consists of meaningless pseudo-statements."},
        {t:"Language Frameworks",d:"Ontological questions are internal (within a linguistic framework, with clear answers) or external (pragmatic choices between frameworks)."},
        {t:"Logical Syntax",d:"Philosophy is the logic of science — its task is to clarify the logical syntax of scientific and ordinary language."},
        {t:"Explication",d:"Philosophy should replace vague ordinary concepts with precise, logically defined explications suited to scientific purposes."},
        {t:"Tolerance Principle",d:"\"In logic there are no morals\" — any logically consistent language framework may be adopted; we should be tolerant of alternatives."}]},
{id:"russell",name:"Bertrand Russell",born:1872,dates:"1872–1970",school:"Analytic",
 works:["Principia Mathematica (with Whitehead)","The Problems of Philosophy","Our Knowledge of the External World","History of Western Philosophy","\"On Denoting\""],
 ideas:[{t:"Logical Atomism",d:"The world consists of atomic facts mirrored by atomic propositions — complex truths are truth-functions of simples."},
        {t:"Theory of Descriptions",d:"\"The present king of France\" is an incomplete symbol — analysis reveals hidden existential and uniqueness claims."},
        {t:"Russell's Paradox",d:"Does the set of all sets that do not contain themselves contain itself? This paradox transformed foundations of mathematics."},
        {t:"Type Theory",d:"Predicates of different logical levels must not be applied across types — a hierarchy that blocks self-referential paradoxes."},
        {t:"Logical Analysis",d:"Philosophy's task is logical analysis of language and thought, dissolving pseudo-problems by clarifying what we mean."}]},
{id:"wittgenstein",name:"Wittgenstein",born:1889,dates:"1889–1951",school:"Analytic",
 works:["Tractatus Logico-Philosophicus","Philosophical Investigations","On Certainty","Remarks on the Foundations of Mathematics","The Blue and Brown Books"],
 ideas:[{t:"Picture Theory",d:"(Early) Propositions are pictures of facts; language shares a logical form with the world. What cannot be said can only be shown."},
        {t:"Language Games",d:"(Late) Meaning is use. Words function within diverse \"language games\" embedded in forms of life, not by pointing to objects."},
        {t:"Private Language Argument",d:"A genuinely private language — words for sensations knowable only to oneself — is impossible. Language is inherently public."},
        {t:"\"Whereof One Cannot Speak\"",d:"Metaphysics, ethics, and aesthetics lie beyond the limits of meaningful language — \"thereof one must be silent.\""},
        {t:"Philosophical Therapy",d:"Philosophical problems arise from misuse of language; philosophy's task is therapeutic — dissolving confusions, not building theories."}]},
{id:"heidegger",name:"Heidegger",born:1889,dates:"1889–1976",school:"Existentialism",
 works:["Being and Time","Introduction to Metaphysics","\"The Question Concerning Technology\"","\"The Origin of the Work of Art\"","Contributions to Philosophy"],
 ideas:[{t:"Being-in-the-World",d:"Dasein is always already engaged with a meaningful world — there is no Cartesian subject facing objects from outside."},
        {t:"Thrownness & Authenticity",d:"We are \"thrown\" into existence without choosing it; authenticity means owning this condition rather than fleeing into the anonymous \"they-self.\""},
        {t:"Being-toward-Death",d:"Mortality is the horizon of all Dasein; genuine existence requires confronting death as one's ownmost possibility."},
        {t:"The Forgetting of Being",d:"Western metaphysics since Plato has forgotten the question of Being itself, focusing only on beings."},
        {t:"Technology as Enframing",d:"Modern technology \"enframes\" the world as standing-reserve (Bestand), reducing all beings — rivers, forests, persons — to fungible resources."}]},
{id:"ryle",name:"Gilbert Ryle",born:1900,dates:"1900–1976",school:"Analytic",
 works:["The Concept of Mind","Dilemmas","Collected Papers (2 vols.)","Plato's Progress","\"Systematically Misleading Expressions\""],
 ideas:[{t:"Category Mistake",d:"Asking to see the \"university\" after touring its colleges commits a category mistake — expecting one type of thing where another type applies."},
        {t:"Ghost in the Machine",d:"Cartesian dualism posits a \"ghost in the machine\" — an absurd category mistake that treats mental vocabulary as naming hidden events."},
        {t:"Knowing-How vs Knowing-That",d:"Knowledge of how to do things (skill, practical intelligence) is irreducible to knowing propositional facts."},
        {t:"Dispositional Analysis",d:"Mental terms (believing, intending) refer not to inner episodes but to dispositions — tendencies to behave in certain ways."},
        {t:"Ordinary Language",d:"Philosophical problems are often dissolved by careful attention to how mental terms actually function in ordinary language."}]},
{id:"gadamer",name:"Hans-Georg Gadamer",born:1900,dates:"1900–2002",school:"Continental",
 works:["Truth and Method","Philosophical Hermeneutics","Dialogue and Dialectic","The Relevance of the Beautiful","Hegel's Dialectic"],
 ideas:[{t:"Hermeneutical Circle",d:"Understanding a text requires understanding its parts, but the parts require understanding the whole — a circle that is not vicious but productive."},
        {t:"Fusion of Horizons",d:"Understanding occurs when the horizon of the interpreter fuses with the horizon of the text — neither is unchanged by genuine dialogue."},
        {t:"Tradition and Prejudice",d:"Prejudices (pre-judgements) are not obstacles to understanding but its enabling conditions — we always interpret from within a tradition."},
        {t:"Art as Truth Disclosure",d:"Art (not just science) discloses truth — aesthetic experience is a genuine mode of knowing that exceeds methodological capture."},
        {t:"Dialogue as Understanding",d:"True understanding is dialogical: it transforms both parties; knowledge is not a possession but an ongoing conversation."}]},
{id:"adorno",name:"Theodor Adorno",born:1903,dates:"1903–1969",school:"Continental",
 works:["Dialectic of Enlightenment (with Horkheimer)","Negative Dialectics","Aesthetic Theory","Minima Moralia","The Authoritarian Personality"],
 ideas:[{t:"Dialectic of Enlightenment",d:"Enlightenment reason, in dominating nature, turns against itself and produces new forms of mythology and domination."},
        {t:"Negative Dialectics",d:"No concept fully captures its object; genuine thought must hold open the non-identity between concept and thing."},
        {t:"Culture Industry",d:"Mass culture is a system of standardised products designed to administer consciousness — it is ideology, not art."},
        {t:"Art as Resistance",d:"Authentic art preserves the utopian impulse by resisting total integration into the administered world."},
        {t:"Immanent Critique",d:"The best critique of an ideology shows it contradicts its own norms — philosophy criticises from within, not from an Archimedean outside."}]},
{id:"arendt",name:"Hannah Arendt",born:1906,dates:"1906–1975",school:"Continental",
 works:["The Origins of Totalitarianism","The Human Condition","Eichmann in Jerusalem","Between Past and Future","On Revolution"],
 ideas:[{t:"The Human Condition",d:"Distinguishes labour (biological necessity), work (fabrication), and action (political speech) — action alone creates genuine freedom."},
        {t:"Banality of Evil",d:"Adolf Eichmann was not a monster but a thoughtless bureaucrat — evil can arise from the absence of thinking, not radical wickedness."},
        {t:"Totalitarianism",d:"Totalitarianism is unprecedented — it seeks not merely domination but the destruction of the human capacity for spontaneous action."},
        {t:"Political Action",d:"The public realm of action and speech is where freedom is actualised; the private realm of necessity cannot replace it."},
        {t:"Thinking and Judging",d:"The capacity to think (step back from one's perspective) and judge (particular cases without general rules) are the antidote to evil."}]},
{id:"levinas",name:"Emmanuel Levinas",born:1906,dates:"1906–1995",school:"Existentialism",
 works:["Totality and Infinity","Otherwise Than Being","Existence and Existents","\"Ethics and Infinity\"","Difficult Freedom"],
 ideas:[{t:"Face of the Other",d:"The face of the other person makes an absolute ethical demand before any philosophical system — \"Thou shalt not kill.\""},
        {t:"Ethics as First Philosophy",d:"Ethics precedes ontology — the encounter with the Other is more fundamental than any theory of Being."},
        {t:"Totality vs Infinity",d:"Western philosophy tends toward totality (absorbing the other into a system); true philosophy must remain open to infinite alterity."},
        {t:"Responsibility",d:"I am responsible for the Other before and beyond any contract or reciprocity — an infinite, asymmetrical obligation."},
        {t:"Critique of Heidegger",d:"Heidegger's ontology forgets the primacy of ethics — Being and Time deals with my existence, neglecting the Other's claim on me."}]},
{id:"sartre",name:"Sartre",born:1905,dates:"1905–1980",school:"Existentialism",
 works:["Being and Nothingness","Existentialism is a Humanism","Critique of Dialectical Reason","Nausea","No Exit"],
 ideas:[{t:"Existence Precedes Essence",d:"For humans there is no pre-given nature or God-given purpose — we exist first, then define ourselves through choice."},
        {t:"Radical Freedom",d:"We are \"condemned to be free\" — there is no escape from choosing; even inaction and self-deception are choices."},
        {t:"Bad Faith",d:"Bad faith (mauvaise foi) is self-deception about freedom — pretending one is determined by role or nature when one is not."},
        {t:"The Look",d:"The gaze of the Other (le regard) objectifies us, reducing us from free subject to thing-for-others."},
        {t:"Facticity",d:"Freedom is always situated freedom — we cannot choose our starting point, only our response to the situation we find ourselves in."}]},
{id:"debeauvoir",name:"Simone de Beauvoir",born:1908,dates:"1908–1986",school:"Existentialism",
 works:["The Second Sex","The Ethics of Ambiguity","The Mandarins","Memoirs of a Dutiful Daughter","The Coming of Age"],
 ideas:[{t:"\"One is Not Born a Woman\"",d:"Femininity is not a biological given but a social construction — woman is defined as \"Other\" by a masculine subject."},
        {t:"Ethics of Ambiguity",d:"Human existence is irreducibly ambiguous — we are both free subjects and conditioned objects; ethical life accepts this tension."},
        {t:"Oppression Diminishes Freedom",d:"Social and material conditions that restrict others also diminish one's own genuine freedom — oppression is a mutual loss."},
        {t:"Situated Freedom",d:"Freedom is always situated — lived from a particular body, class, race, and historical moment. There is no view from nowhere."},
        {t:"The Other as Horizon",d:"Genuine ethical life requires recognising others as free subjects, not instruments — the existentialist foundation of feminist ethics."}]},
{id:"merleau-ponty",name:"Merleau-Ponty",born:1908,dates:"1908–1961",school:"Existentialism",
 works:["Phenomenology of Perception","The Structure of Behavior","The Visible and the Invisible","Signs","Adventures of the Dialectic"],
 ideas:[{t:"Body as Subject",d:"The body is not an object we inhabit but the subject of perception — I perceive through my body, not despite it."},
        {t:"Embodied Cognition",d:"Perception and cognition are grounded in our bodily, motor engagement with the world — thought is not detached from flesh."},
        {t:"Motor Intentionality",d:"The body has its own pre-reflective intentionality — habits and skilled action are a form of knowledge \"in the hands and feet.\""},
        {t:"The Flesh",d:"The world and the perceiving body are made of the same \"flesh\" — the percipient and the perceived are intertwined, not opposed."},
        {t:"Critique of Both Camps",d:"Neither empiricism (passive sensation) nor intellectualism (imposing categories) adequately describes lived perception — a middle path is required."}]},
{id:"quine",name:"W.V.O. Quine",born:1908,dates:"1908–2000",school:"Analytic",
 works:["Word and Object","From a Logical Point of View","\"Two Dogmas of Empiricism\"","Ontological Relativity","The Ways of Paradox"],
 ideas:[{t:"Two Dogmas",d:"The analytic/synthetic distinction and reductionism to sense-data are both untenable — two dogmas of empiricism that must be abandoned."},
        {t:"Naturalized Epistemology",d:"Epistemology should become a chapter of natural science — how we actually acquire knowledge, not how we ideally should."},
        {t:"Indeterminacy of Translation",d:"There is no fact of the matter about what a foreign sentence means — translation is always underdetermined by evidence."},
        {t:"Ontological Relativity",d:"What entities exist is relative to a background theory — \"to be is to be the value of a bound variable.\""},
        {t:"Web of Belief",d:"All beliefs face experience together as a corporate body; any belief can be revised given sufficient pressure from elsewhere."}]},
{id:"ayer",name:"A.J. Ayer",born:1910,dates:"1910–1989",school:"Analytic",
 works:["Language, Truth and Logic","The Foundations of Empirical Knowledge","The Problem of Knowledge","The Central Questions of Philosophy","Philosophical Essays"],
 ideas:[{t:"Verification Principle",d:"A statement is meaningful only if it is analytic or empirically verifiable — this eliminates most metaphysics as nonsense."},
        {t:"Emotivism",d:"Moral statements do not describe facts but express attitudes — \"murder is wrong\" means something like \"murder, boo!\""},
        {t:"Phenomenalism",d:"Material objects are logical constructions from actual and possible sense-experiences — following Russell and Mill."},
        {t:"A Priori as Analytic",d:"All a priori knowledge is analytic — true by virtue of meaning alone; there is no Kantian synthetic a priori."},
        {t:"Anti-Metaphysics",d:"Metaphysical statements are neither true nor false but literally meaningless — they fail the verification criterion."}]},
{id:"austin-jl",name:"J.L. Austin",born:1911,dates:"1911–1960",school:"Analytic",
 works:["How to Do Things with Words","Sense and Sensibilia","Philosophical Papers","\"Other Minds\"","\"A Plea for Excuses\""],
 ideas:[{t:"Speech Act Theory",d:"Utterances do not merely describe the world; they perform actions — promising, warning, declaring, apologising."},
        {t:"Performatives vs Constatives",d:"\"I promise\" does something rather than describing something — Austin's initial distinction between doing and saying."},
        {t:"Illocutionary Force",d:"Every utterance has a locutionary (meaning), illocutionary (what it does — warn, order, promise), and perlocutionary (effect) dimension."},
        {t:"Excuses",d:"Careful attention to how we excuse and justify actions reveals the fine structure of moral agency and intention."},
        {t:"Ordinary Language Philosophy",d:"Ordinary language embeds centuries of practical wisdom; philosophical problems often dissolve under careful attention to usage."}]},
{id:"strawson",name:"P.F. Strawson",born:1919,dates:"1919–2006",school:"Analytic",
 works:["Individuals: An Essay in Descriptive Metaphysics","The Bounds of Sense","Freedom and Resentment","Introduction to Logical Theory","Subject and Predicate in Logic and Grammar"],
 ideas:[{t:"Descriptive Metaphysics",d:"Philosophy should describe the actual conceptual scheme we employ, not revise or replace it — persons and bodies are its basic particulars."},
        {t:"Reactive Attitudes",d:"Our practices of holding responsible rest on reactive attitudes (resentment, gratitude) that are constitutive of human relationships, not reducible to theory."},
        {t:"Persons as Basic",d:"Persons (not minds and bodies separately) are basic particulars — mental and physical predicates apply to the same subject."},
        {t:"Kant Interpretation",d:"The Bounds of Sense reinterprets the Critique as concerned with the conditions of experience, separating the analytic from the transcendental story."},
        {t:"Reference and Truth",d:"Truth is not a property of statements but what speakers do in affirming statements; reference is part of the speech act."}]},
{id:"davidson",name:"Donald Davidson",born:1917,dates:"1917–2003",school:"Analytic",
 works:["Essays on Actions and Events","Inquiries into Truth and Interpretation","Subjective, Intersubjective, Objective","Problems of Rationality","\"Mental Events\""],
 ideas:[{t:"Anomalous Monism",d:"Mental events are identical with physical events but there are no strict laws connecting mental and physical descriptions."},
        {t:"Radical Interpretation",d:"Understanding a speaker requires attributing mostly true and rational beliefs — the principle of charity is constitutive of interpretation."},
        {t:"Triangulation",d:"Objective knowledge of the world requires three vertices: two interpreters and a shared world — objectivity is irreducibly social."},
        {t:"Holism of the Mental",d:"Mental concepts form a holistic web — you cannot assign content to one belief without assigning content to many others."},
        {t:"Causal Theory of Action",d:"Actions are events caused by reasons (desires and beliefs) — a defence of the commonsense view against Ryle's dispositionalism."}]},
{id:"putnam",name:"Hilary Putnam",born:1926,dates:"1926–2016",school:"Analytic",
 works:["Reason, Truth and History","Representation and Reality","The Many Faces of Realism","Renewing Philosophy","\"The Meaning of 'Meaning'\""],
 ideas:[{t:"Twin Earth",d:"Twin Earth's XYZ is indistinguishable from water but a different substance — meanings are not in the head; reference depends on the world."},
        {t:"Semantic Externalism",d:"The content of many mental states is determined by factors external to the thinker — the environment matters for meaning."},
        {t:"No-Miracles Argument",d:"The success of science would be a miracle if scientific theories were not approximately true — a realist inference to the best explanation."},
        {t:"Internal Realism",d:"Truth is what an ideal epistemic agent would accept in ideal conditions — neither naive realism nor anti-realism."},
        {t:"Functionalism",d:"Mental states are defined by their functional roles (causal relations to inputs, outputs, and other states), not by their physical substrate."}]},
{id:"dummett",name:"Michael Dummett",born:1925,dates:"1925–2011",school:"Analytic",
 works:["Frege: Philosophy of Language","Truth and Other Enigmas","The Logical Basis of Metaphysics","Origins of Analytical Philosophy","\"What is a Theory of Meaning?\""],
 ideas:[{t:"Anti-Realism about Meaning",d:"If meaning is use, then truth cannot transcend all possible verification — a statement is true only if there is evidence for it in principle."},
        {t:"Proof-Conditional Semantics",d:"For mathematical statements, meaning is given by proof conditions, not truth conditions — justifying intuitionist logic."},
        {t:"Frege Scholarship",d:"Revived Frege as the founder of analytic philosophy, showing his philosophy of language as its central concern."},
        {t:"Metaphysics via Semantics",d:"Metaphysical disputes (realism vs anti-realism) should be resolved through the theory of meaning, not directly."},
        {t:"Classical vs Intuitionistic Logic",d:"Anti-realism about mathematical objects supports intuitionistic logic, which rejects the law of excluded middle for undecidable statements."}]},
{id:"berlin",name:"Isaiah Berlin",born:1909,dates:"1909–1997",school:"Political",
 works:["Two Concepts of Liberty","The Hedgehog and the Fox","Four Essays on Liberty","The Crooked Timber of Humanity","Against the Current","The Roots of Romanticism"],
 ideas:[{t:"Negative & Positive Liberty",d:"Negative liberty is absence of interference by others; positive liberty is the capacity to be one's own master. Berlin warned that positive liberty could be hijacked to justify totalitarianism."},
        {t:"Value Pluralism",d:"Ultimate human values are genuinely plural, incommensurable, and sometimes in irreducible conflict — there is no single scale on which they can all be ranked."},
        {t:"The Counter-Enlightenment",d:"Berlin traced a tradition — Vico, Herder, Hamann — that resisted Enlightenment universalism, insisting on cultural particularity and the irreducibility of human difference."},
        {t:"The Hedgehog and the Fox",d:"The fox knows many things; the hedgehog knows one big thing. Tolstoy was a fox who wanted to be a hedgehog — and this tension shaped his art."},
        {t:"Liberalism & Pluralism",d:"Liberalism is justified not by any single supreme value but by the need to maintain space for competing values — pluralism grounds toleration."}]},
{id:"rawls",name:"John Rawls",born:1921,dates:"1921–2002",school:"Analytic",
 works:["A Theory of Justice","Political Liberalism","The Law of Peoples","Justice as Fairness: A Restatement","\"Two Concepts of Rules\""],
 ideas:[{t:"Original Position",d:"Just principles are those chosen by rational agents behind a veil of ignorance, not knowing their place in society — a device for impartiality."},
        {t:"Two Principles of Justice",d:"Equal basic liberties for all; inequalities only if they benefit the least advantaged (difference principle) with fair equal opportunity."},
        {t:"Justice as Fairness",d:"Justice is not maximising aggregate welfare but securing fair terms of social cooperation between free and equal persons."},
        {t:"Overlapping Consensus",d:"A just pluralist society does not require citizens to share a comprehensive doctrine — political consensus from diverse starting points."},
        {t:"Primary Goods",d:"All rational persons want primary goods — rights, opportunities, income, wealth, self-respect — regardless of their particular ends."}]},
{id:"habermas",name:"Jürgen Habermas",born:1929,dates:"1929–",school:"Continental",
 works:["The Theory of Communicative Action","Knowledge and Human Interests","The Philosophical Discourse of Modernity","Between Facts and Norms","Moral Consciousness and Communicative Action"],
 ideas:[{t:"Communicative Rationality",d:"There is a rationality immanent in communicative action oriented toward mutual understanding — distinct from strategic, instrumental reason."},
        {t:"Discourse Ethics",d:"A norm is valid only if all those affected by it could agree to it in an ideal rational discourse — universalisation without monologue."},
        {t:"Lifeworld vs System",d:"The lifeworld (shared meanings, communication) is being colonised by system (money, administrative power) — the pathology of modernity."},
        {t:"Modernity as Unfinished",d:"Against postmodernism: modernity is an unfinished project, not a failed one — its emancipatory potential has not been exhausted."},
        {t:"Gadamer Debate",d:"Against Gadamer's rehabilitation of tradition, Habermas insists that critical reason can and must step outside tradition to evaluate it."}]},
{id:"foucault",name:"Michel Foucault",born:1926,dates:"1926–1984",school:"Continental",
 works:["Discipline and Punish","The History of Sexuality","The Order of Things","Madness and Civilization","The Archaeology of Knowledge"],
 ideas:[{t:"Power/Knowledge",d:"Power and knowledge are inseparable — regimes of truth are also regimes of power; what counts as knowledge sustains power relations."},
        {t:"Genealogy",d:"History should reveal the contingent, often violent origins of what presents itself as natural or necessary — following Nietzsche's method."},
        {t:"Discipline and Surveillance",d:"Modern power operates through normalisation and surveillance — the panopticon is the model for disciplinary society."},
        {t:"The Subject as Constructed",d:"The individual subject is not a given but a product of power/knowledge — subjectivity is historically constituted, not natural."},
        {t:"Biopolitics",d:"Modern power increasingly targets the life of populations (health, sexuality, reproduction) — a new form of governmentality."}]},
{id:"derrida",name:"Jacques Derrida",born:1930,dates:"1930–2004",school:"Continental",
 works:["Of Grammatology","Writing and Difference","Speech and Phenomena","Dissemination","\"Structure, Sign and Play\""],
 ideas:[{t:"Deconstruction",d:"Binary oppositions (presence/absence, speech/writing) always secretly privilege one term — deconstruction reveals and unsettles this hierarchy."},
        {t:"Différance",d:"Meaning is never fully present — it is always deferred (temporally) and differs (spatially) from other signs. Presence is an illusion."},
        {t:"Logocentrism",d:"Western philosophy has privileged speech over writing, presence over absence, as if meaning could be directly and fully present."},
        {t:"The Supplement",d:"What is added as a supplement (writing, play) turns out to be constitutive of what it supposedly supplements — the margin is the centre."},
        {t:"Hospitality",d:"Late Derrida: unconditional hospitality (welcoming the absolutely unknown other) is the impossible but necessary ethical demand."}]},
{id:"david-lewis",name:"David Lewis",born:1941,dates:"1941–2001",school:"Analytic",
 works:["On the Plurality of Worlds","Counterfactuals","Convention","Parts of Classes","Philosophical Papers (2 vols.)"],
 ideas:[{t:"Modal Realism",d:"All possible worlds are real, concrete, and spatiotemporally isolated from our world — possibility is not metaphor but literal plurality."},
        {t:"Counterfactual Analysis",d:"\"If it had been the case that A, B would have been the case\" — counterfactuals are analysed via closeness of possible worlds."},
        {t:"Humean Supervenience",d:"Everything supervenes on the spatiotemporal distribution of local intrinsic qualities — no necessary connections in nature."},
        {t:"Natural Properties",d:"Some properties are perfectly natural (electron charge) and others are grue-like gerrymandering — naturalness is an objective matter."},
        {t:"Convention",d:"Social conventions are self-reinforcing regularities based on coordination games — a behavioural account of meaning and social norms."}]},
{id:"nagel",name:"Thomas Nagel",born:1937,dates:"1937–",school:"Analytic",
 works:["The View from Nowhere","Mortal Questions","\"What Is It Like to Be a Bat?\"","The Last Word","Mind and Cosmos"],
 ideas:[{t:"Bat Argument",d:"\"What is it like to be a bat?\" — subjective character of experience cannot be captured by any objective, physical description."},
        {t:"The View from Nowhere",d:"Objective understanding requires a view from nowhere (sub specie aeternitatis) that conflicts with our first-person perspective — no synthesis is possible."},
        {t:"Moral Luck",d:"Moral assessment is undermined by luck — what we are judged for (outcomes, character) is largely beyond our control."},
        {t:"Panpsychism Sympathy",d:"If consciousness is irreducible to physics, perhaps proto-mental properties are fundamental features of nature rather than emergent ones."},
        {t:"Fragmentation of Value",d:"Personal, agent-relative reasons and impersonal, agent-neutral reasons both exist and cannot be reduced to each other — value is genuinely plural."}]},
{id:"anscombe",name:"G.E.M. Anscombe",born:1919,dates:"1919–2001",school:"Analytic",
 works:["Intention","\"Modern Moral Philosophy\"","An Introduction to Wittgenstein's Tractatus","Collected Philosophical Papers (3 vols.)","The Collected Works (CUA Press)"],
 ideas:[{t:"Intention",d:"Intentional action is characterised by a special kind of knowledge of what one is doing — not observation but practical knowledge."},
        {t:"\"Modern Moral Philosophy\"",d:"Coined \"consequentialism\"; argued that Kantian and utilitarian ethics are incoherent without a teleological framework — reviving virtue ethics."},

{id:"bernard-williams",name:"Bernard Williams",born:1929,dates:"1929–2003",school:"Analytic",
 works:["Ethics and the Limits of Philosophy","Moral Luck","Shame and Necessity","Truth and Truthfulness","Problems of the Self"],
 ideas:[{t:"Integrity",d:"Utilitarianism alienates agents from their projects and commitments — morality should leave room for a person's own ground projects."},

        {t:"Critique of Moral Theory",d:"Systematic moral theories (Kantian, utilitarian) distort ethical life — we should think in terms of character, wisdom, and historical contingency."}]},
{id:"parfit",name:"Derek Parfit",born:1942,dates:"1942–2017",school:"Analytic",
 works:["Reasons and Persons","On What Matters (3 vols.)","\"Personal Identity\" (1971)","\"Divided Minds and the Nature of Persons\"","\"Equality and Priority\""],
 ideas:[{t:"Reductionism about Personal Identity",d:"Personal identity is not a deep further fact — it consists in physical and psychological continuity; what matters is not identity per se."},

        {t:"Convergence of Ethical Theories",d:"In On What Matters, Kantian, consequentialist, and contractualist ethics converge on the same fundamental moral truths."},

{id:"nozick",name:"Robert Nozick",born:1938,dates:"1938–2002",school:"Analytic",
 works:["Anarchy, State, and Utopia","Philosophical Explanations","The Examined Life","The Nature of Rationality","Invariances"],
 ideas:[{t:"Minimal State",d:"Only the minimal night-watchman state is morally justified; more extensive states violate individual rights."},
        {t:"Entitlement Theory",d:"Justice in holdings depends entirely on just acquisition and just transfer of property, not on any pattern of distribution."},

{id:"kripke",name:"Saul Kripke",born:1940,dates:"1940–2022",school:"Analytic",
 works:["Naming and Necessity","Wittgenstein on Rules and Private Language","\"Semantical Considerations on Modal Logic\"","Reference and Existence","\"A Puzzle About Belief\""],

        {t:"Possible Worlds Semantics",d:"Modal logic is given truth conditions via possible worlds — a rigorous framework for necessity and possibility."},
        {t:"Causal Theory of Reference",d:"Names refer via causal-historical chains, not descriptions — we inherit references from our linguistic community."},

{id:"rorty",name:"Richard Rorty",born:1931,dates:"1931–2007",school:"Pragmatism",

{id:"dennett",name:"Daniel Dennett",born:1942,dates:"1942–",school:"Analytic",

{id:"chalmers",name:"David Chalmers",born:1966,dates:"1966–",school:"Analytic",

  degreeMap.set(s,(degreeMap.get(s)||0)+1);

});
const maxDeg = Math.max(...degreeMap.values());
const nr = id => 7 + (degreeMap.get(id)||0)/maxDeg*13; // 7–20

// Piecewise linear chronoX: allocates more horizontal space to denser modern periods
function chronoX(b,W){
  const bp=[[-650,0.02],[600,0.17],[1600,0.32],[1780,0.50],[1870,0.62],[1970,0.97]];
  for(let i=1;i<bp.length;i++){
    if(b<=bp[i][0]){
      const t=(b-bp[i-1][0])/(bp[i][0]-bp[i-1][0]);
      return(bp[i-1][1]+t*(bp[i][1]-bp[i-1][1]))*W;
    }
  }
  return 0.97*W;
}
