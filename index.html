  linkSel
    .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
    .attr("x2",d=>{ const r=nr(getId(d.target))+2; const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,l=Math.hypot(dx,dy)||1; return d.target.x-dx/l*r; })
    .attr("y2",d=>{ const r=nr(getId(d.target))+2; const dx=d.target.x-d.source.x,dy=d.target.y-d.source.y,l=Math.hypot(dx,dy)||1; return d.target.y-dy/l*r; });
  nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
});

// ─── SELECTION ───────────────────────────────────────────────────────────────

let selected=null;

// Undirected BFS — returns Map<id, distance>
function bfsDistances(startId){
  const dist=new Map([[startId,0]]);
  const queue=[startId];
  while(queue.length){
    const cur=queue.shift();
    const d=dist.get(cur);
    const nbs=[...(outgoing.get(cur)||[]),...(incoming.get(cur)||[])];
    for(const nb of nbs){ if(!dist.has(nb)){dist.set(nb,d+1);queue.push(nb);} }
  }
  return dist;
}

function distAlpha(d){
  if(d===undefined) return 0.055;
  if(d===0) return 1;
  if(d===1) return 0.88;
  if(d===2) return 0.40;
  if(d===3) return 0.16;
  return 0.07;
}

function selectNode(d){
  selected=d;
  const dist=bfsDistances(d.id);
  const inc=incoming.get(d.id)||[];
  const out=outgoing.get(d.id)||[];

  nodeSel.classed("dimmed",false).classed("selected",n=>n.id===d.id);
  nodeSel.select("circle")
    .attr("r",n=>n.id===d.id?nr(n.id)*1.52:nr(n.id))
    .attr("fill-opacity",n=>distAlpha(dist.get(n.id)))
    .attr("stroke-opacity",n=>Math.min(1,distAlpha(dist.get(n.id))+0.12))
    .attr("stroke-width",n=>n.id===d.id?2.5:1.8);
  nodeSel.select("text")
    .attr("opacity",n=>Math.min(1,distAlpha(dist.get(n.id))*1.4+0.04));

  linkSel
    .attr("stroke-opacity",l=>{
      const s=getId(l.source),t=getId(l.target);
      if(s===d.id||t===d.id) return 0.85;
      const sd=dist.get(s), td=dist.get(t);
      if(sd===1&&td===1) return 0.18;
      if((sd||999)<=2||(td||999)<=2) return 0.06;
      return 0.01;
    })
    .attr("stroke-width",l=>{
      const s=getId(l.source),t=getId(l.target);
      return(s===d.id||t===d.id)?2.2:1.2;
    });

  fillSidebar(d,[...inc],[...out]);
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("pathfinder-wrap").classList.add("sidebar-open");
}

function deselect(){
  selected=null;
  nodeSel.classed("dimmed",false).classed("selected",false);
  nodeSel.select("circle")
    .attr("r",d=>nr(d.id))
    .attr("fill-opacity",0.82)
    .attr("stroke-opacity",0.45)
    .attr("stroke-width",2);
  nodeSel.select("text").attr("opacity",1);
  linkSel.attr("stroke-opacity",0.28).attr("stroke-width",1.4);
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("pathfinder-wrap").classList.remove("sidebar-open");
}

function getId(x){ return typeof x==="object"?x.id:x; }

// ─── SIDEBAR ─────────────────────────────────────────────────────────────────

function fillSidebar(d,incIds,outIds){
  document.getElementById("philosopher-name").textContent=d.name;
  document.getElementById("philosopher-dates").textContent=d.dates;
  const badge=document.getElementById("school-badge");
  const col=SCHOOLS[d.school]?.color||"#888";
  badge.textContent=d.school;
  badge.style.cssText=`background:${col}22;color:${col};border:1px solid ${col}44`;
  document.getElementById("philosopher-school").textContent=SCHOOLS[d.school]?.label||d.school;
  const topics=PHILOSOPHER_TOPICS[d.id]||[];
  document.getElementById("topics-list").innerHTML=topics.length
    ? topics.map(t=>`<span class="topic-tag" onclick="showTopicWeb('${t}')">${t}</span>`).join("")
    : '<span class="none-text">No topics tagged</span>';
  document.getElementById("works-list").innerHTML=d.works.map(w=>`<li>${w}</li>`).join("");
  document.getElementById("ideas-list").innerHTML=d.ideas.map(i=>`<li><strong>${i.t}</strong>${i.d}</li>`).join("");
  document.getElementById("influenced-by").innerHTML=relTags(incIds);
  document.getElementById("influenced").innerHTML=relTags(outIds);
}

function relTags(ids){
  if(!ids.length) return '<span class="none-text">None in this network</span>';
  return `<div class="rel-tags">${ids.map(id=>{
    const p=philosopherMap.get(id); if(!p) return "";
    const c=SCHOOLS[p.school]?.color||"#888";
    return `<span class="rel-tag" style="background:${c}1a;color:${c};border:1px solid ${c}40" onclick="jumpTo('${id}')">${p.name}</span>`;
  }).join("")}</div>`;
}

window.jumpTo=function(id){
  const p=philosopherMap.get(id); if(!p) return;
  const tx=W/2-p.x,ty=H/2-p.y;
  svg.transition().duration(500).call(zoom.transform,d3.zoomIdentity.translate(tx,ty).scale(1.4));
  setTimeout(()=>selectNode(p),100);
};

document.getElementById("sidebar-close").addEventListener("click",deselect);

const searchEl=document.getElementById("search");
const resultsEl=document.getElementById("search-results");

function isTopicTab(){ return document.getElementById("tab-btn-topics").classList.contains("active"); }

searchEl.addEventListener("input",()=>{
  const q=searchEl.value.toLowerCase().trim();
  if(!q){ resultsEl.style.display="none"; return; }

  if(isTopicTab()){
    // Search topics + subtopics
    const hits=[];
    TOPIC_TREE.forEach(t=>{
      if(t.label.toLowerCase().includes(q)) hits.push({type:"topic",id:t.id,label:t.label,color:t.color,sub:""});
      t.subs.forEach(s=>{ if(s.label.toLowerCase().includes(q)) hits.push({type:"sub",id:s.id,label:s.label,color:t.color,sub:t.label,topicId:t.id}); });
    });
    if(!hits.length){ resultsEl.style.display="none"; return; }
    resultsEl.innerHTML=hits.slice(0,7).map(h=>
      `<div class="search-result-item" data-id="${h.id}" data-type="${h.type}" data-topicid="${h.topicId||h.id}">
        <span class="search-result-name" style="color:${h.color}">${h.label}</span>
        <span class="search-result-dates">${h.sub||"Top-level topic"}</span>
      </div>`
    ).join("");
    resultsEl.style.display="block";
    resultsEl.querySelectorAll(".search-result-item").forEach(el=>{
      el.addEventListener("click",()=>{
        searchEl.value=""; resultsEl.style.display="none";
        buildTopicWeb();
        const topicData=TOPIC_TREE.find(t=>t.id===el.dataset.topicid); if(!topicData) return;
        const nodeType=el.dataset.type;
        const fakeNode={id:el.dataset.id,type:nodeType,topicId:el.dataset.topicid};
        setTimeout(()=>selectTwNode(fakeNode),80);
      });
    });
  } else {
    // Search philosophers (network tab)
    const hits=philosophers.filter(p=>p.name.toLowerCase().includes(q)||p.school.toLowerCase().includes(q)||(SCHOOLS[p.school]?.label||"").toLowerCase().includes(q)).slice(0,7);
    if(!hits.length){ resultsEl.style.display="none"; return; }
    resultsEl.innerHTML=hits.map(p=>
      `<div class="search-result-item" data-id="${p.id}">
        <span class="search-result-name" style="color:${SCHOOLS[p.school]?.color||"#e8e8f0"}">${p.name}</span>
        <span class="search-result-dates">${p.dates}</span>
      </div>`
    ).join("");
    resultsEl.style.display="block";
    resultsEl.querySelectorAll(".search-result-item").forEach(el=>{
      el.addEventListener("click",()=>{
        const p=philosopherMap.get(el.dataset.id); if(!p) return;
        searchEl.value=""; resultsEl.style.display="none";
        jumpTo(p.id);
      });
    });
  }
});

searchEl.addEventListener("keydown",e=>{ if(e.key==="Escape"){ resultsEl.style.display="none"; searchEl.blur(); }});
document.addEventListener("click",e=>{ if(!e.target.closest("#search-container")) resultsEl.style.display="none"; });

document.addEventListener("keydown",e=>{
  if(e.key!=="Escape") return;
  resultsEl.style.display="none";
  const isTopics=document.getElementById("tab-btn-topics").classList.contains("active");
  if(isTopics){ closeTwSidebar(); } else { deselect(); }
});

  {id:"metaphysics",label:"Metaphysics",color:"#fbbf24",

  {id:"epistemology",label:"Epistemology",color:"#6ab4ff",

   subs:[
     {id:"epis-foundations",label:"Foundations of Knowledge",
      desc:"Does all knowledge ultimately rest on a bedrock of self-evident, indubitable truths — or is justification a web where every belief supports every other? Foundationalism, from Descartes to Roderick Chisholm, holds that the regress of justification must end somewhere: in basic beliefs that are self-justifying or immediately warranted by experience. Coherentism (Neurath's boat) says there is no bedrock — we are sailors who must rebuild our ship plank by plank while at sea. Reliabilism sidesteps the debate entirely: a belief is justified if it was produced by a reliable cognitive process, regardless of whether the believer can articulate why.",

  {id:"ethics",label:"Ethics",color:"#00e88c",

  {id:"logic",label:"Logic",color:"#c084fc",

  {id:"phil-mind",label:"Phil. of Mind",color:"#ff8c3a",

      debates:["Social Contract","Consent","Civil Disobedience"]},
     {id:"pol-liberty",label:"Liberty",
      desc:"What is freedom? Isaiah Berlin's enormously influential 1958 essay 'Two Concepts of Liberty' distinguished two: negative liberty — the absence of external obstacles imposed by other people — and positive liberty — the capacity for self-direction, for being the master of one's own life. Mill's harm principle limits state intervention to preventing harm to others, leaving a wide sphere of personal negative liberty. But critics argued that formal freedom without the material conditions to exercise it is hollow. Republicans like Pettit argue that freedom is non-domination — not merely non-interference, but freedom from the possibility of arbitrary interference. What does a free society look like, and what must the state do — or refrain from doing — to create it?",
      debates:["Positive vs Negative Freedom","Harm Principle","Republicanism"]},
   ]},
  {id:"phil-language",label:"Phil. of Language",color:"#00d8ff",
   overview:"How does language mean? How do words reach out and latch onto the world? How can the sentence 'Snow is white' be about snow, which exists in the world, rather than in language? The philosophy of language addresses the nature of meaning, reference, and truth. It asks: Do names like 'Aristotle' mean the same as a description, or do they refer directly? Does what I mean depend on what is in my head, or on my environment and community? When I promise, am I just describing a future state or actually doing something? These questions drove the 'linguistic turn' of 20th-century analytic philosophy and shaped logic, linguistics, and the theory of mind.",
   subs:[
     {id:"lang-meaning",label:"Meaning & Reference",
      desc:"What is the relationship between a word and what it refers to? Frege's distinction between sense and reference was the founding insight: 'the morning star' and 'the evening star' refer to the same object (Venus) but present it under different modes of description. Russell analysed definite descriptions ('the present King of France') as quantified statements rather than names, avoiding the problem of reference failure. Kripke's 'Naming and Necessity' overturned the Russellian tradition: proper names are rigid designators — they refer to the same individual in every possible world, not by fitting a description. Putnam extended this externalism to natural kind terms: 'water' refers to H₂O not because of how we conceive it but because of what it really is.",
      debates:["Sense vs Reference","Semantic Externalism","Use Theory"]},
     {id:"lang-speech",label:"Speech Acts",
      desc:"When you say 'I promise', are you describing your mental state or actually making a promise? Austin's discovery of performatives — utterances that are themselves actions — transformed the philosophy of language. His theory of speech acts distinguished the locutionary act (saying something with a meaning), the illocutionary act (the act performed in saying it: warning, promising, ordering), and the perlocutionary act (the effect on the hearer). Grice showed that conversational meaning goes far beyond sentence meaning through maxims of quantity, quality, relation, and manner — when you say 'Can you pass the salt?' you communicate a request, not a question about ability. How much of meaning lies in the sentence itself, and how much in the context of utterance?",
      debates:["Performatives","Illocutionary Force","Conversational Implicature"]},
     {id:"lang-truth",label:"Truth & Interpretation",
      desc:"What makes a sentence true, and how do we understand a language we don't already know? Tarski's semantic theory of truth provided a formal definition: 'Snow is white' is true if and only if snow is white. Davidson used this as a basis for a theory of interpretation: to understand a language is to know the conditions under which its sentences are true. His principle of charity — attribute mostly true and rational beliefs to any speaker — is constitutive of meaning, not a methodological hint. Quine's radical indeterminacy of translation argued that there is no fact of the matter about which of many possible translation schemes is correct — meaning is radically underdetermined by behaviour. Dummett challenged the entire framework: understanding a sentence is knowing its assertibility-conditions, not its truth-conditions.",
      debates:["Tarskian Truth","Radical Interpretation","Indeterminacy"]},
   ]},
  {id:"aesthetics",label:"Aesthetics",color:"#ff55b8",
   overview:"What is beauty? Is it in the eye of the beholder, or is there something objectively beautiful about a Bach fugue or the Parthenon? What is art — can anything be art, or must it have intrinsic properties? How does art give us knowledge? Why do we seek out tragedy, horror, and sadness in art when we avoid them in life? Aesthetics asks the philosophical questions that underlie our engagements with art, music, literature, and nature. It connects to epistemology (can art convey truth?), ethics (can art be morally corrupt?), and metaphysics (are fictional entities real?). Kant's third Critique — the Critique of Judgement — remains its greatest single achievement.",
   subs:[
     {id:"aes-beauty",label:"Beauty & Taste",
      desc:"When you call a sunset beautiful, are you saying something about the sunset or about yourself? Hume thought aesthetic judgements expressed sentiment — but argued there are nonetheless standards of taste that distinguish better and worse critics. Kant gave a more ambitious answer: the judgement of beauty claims universal validity ('This is beautiful' is not merely 'I like this') while remaining grounded in feeling rather than concepts. This paradox — subjective universality — is the central problem of aesthetics. The beautiful pleases through disinterested contemplation; the sublime — the overwhelming or terrifying in nature — goes further, producing a complex response that reveals our rational supersensible nature. Is there a universal standard of beauty, or is taste irreducibly personal?",
      debates:["Subjective vs Objective Beauty","Disinterested Pleasure","The Sublime"]},
     {id:"aes-art",label:"Art & Expression",
      desc:"What makes something a work of art rather than a mere object? And what, if anything, does art do that nothing else can? Heidegger's radical answer: great art discloses truth in a way unavailable to science or philosophy — it 'sets up a world' and reveals the being of things. Van Gogh's painting of peasant boots discloses the entire form of life of the peasant world. The expression theory, associated with Collingwood and Croce, held that art is the externalisation of inner emotion — not just the arousal of feeling in the audience but its clarification through the creative act. Dickie's institutional theory deflated all of this: art is whatever the artworld — the network of artists, critics, curators, and institutions — declares to be art. Does this make art arbitrary?",
      debates:["Art as Truth Disclosure","Expression Theory","Institutional Theory"]},
     {id:"aes-representation",label:"Representation",
      desc:"How does an image represent its subject? Plato's answer was devastating: the painter imitates appearances, which are themselves copies of the real (the Forms) — so art is three removes from reality and epistemically worthless. Aristotle rehabilitated mimesis: tragic imitation produces catharsis — the purgation of pity and fear — and provides genuine understanding of universal human possibilities. Goodman's symbol theory showed that representation is not resemblance but a conventional symbol relation — a painting represents what it refers to under a system of conventions. Nietzsche saw art as the supreme affirmation of life in the face of suffering: the aesthetic justification of existence. Can aesthetic experience itself be a form of knowledge? Can a novel teach us something a scientific study cannot?",
      debates:["Mimesis","Symbol & Metaphor","Aesthetic Experience"]},
   ]},
  {id:"phil-religion",label:"Phil. of Religion",color:"#4ade80",
   overview:"Does God exist? Can the existence of a perfectly good, omnipotent creator be reconciled with the suffering and evil in the world? Is religious faith rational — or does it require the suspension of reason? What is the relationship between religious belief and scientific knowledge? Philosophy of religion addresses these questions with the rigour of analytic argument and the depth of millennia of theological tradition. The classical arguments for God's existence — ontological, cosmological, teleological — have been debated since Anselm and Aquinas and systematically challenged by Hume and Kant. Whether the question is settled or still open remains one of the most contested issues in philosophy.",
   subs:[
     {id:"rel-existence",label:"Arguments for God",
      desc:"Can we prove that God exists through reason alone? The ontological argument, formulated by Anselm, proceeds entirely a priori: God is defined as the greatest conceivable being; a being that exists in reality is greater than one that exists only in the mind; therefore God must exist in reality. Kant's famous objection: existence is not a predicate — saying God exists adds nothing to the concept of God. The cosmological argument proceeds a posteriori from the existence of the world: everything that exists has a cause, so there must be an uncaused first cause — what Aquinas called the Unmoved Mover. Hume's Dialogues Concerning Natural Religion systematically dismantled the design argument: even if the world looks designed, we cannot infer a designer anything like the God of religion. Darwin provided the alternative explanation for apparent design in biology.",
      debates:["Ontological Argument","Cosmological Argument","Design Argument"]},
     {id:"rel-faith",label:"Faith & Reason",
      desc:"Is religious belief compatible with reason, or does it require going beyond reason — or even against it? Anselm's motto — 'credo ut intelligam' (I believe in order to understand) — holds that faith is prior to reason but that reason can illuminate and develop what faith holds. Aquinas's synthesis of faith and Aristotelian reason made rational theology a medieval cornerstone. Kierkegaard broke radically with this: genuine faith in the God of Abraham, who commanded the sacrifice of Isaac, is not a conclusion of rational argument but a passionate, personal leap into the absurd. Plantinga's reformed epistemology argues that belief in God can be 'properly basic' — rational without any inferential justification, just as perceptual beliefs are rational without proof.",
      debates:["Faith Seeking Understanding","Leap of Faith","Reformed Epistemology"]},
     {id:"rel-evil",label:"Problem of Evil",
      desc:"If God is all-powerful, all-knowing, and perfectly good, why does so much evil and suffering exist? The problem of evil is widely considered the strongest argument against theism. Logical versions claim the existence of evil is flatly inconsistent with God's existence; evidential versions claim merely that evil constitutes strong evidence against theism. Theodicy attempts to reconcile God and evil by explaining why a good God would permit it. Leibniz argued this is the best possible world — a world with no evil might have less overall good. The free will defence holds that God could not create free creatures who always freely choose the good. Hick's soul-making theodicy argues that suffering is necessary for moral and spiritual development — a world without adversity could not produce genuinely virtuous persons.",
      debates:["Theodicy","Free Will Defence","Soul-Making Theodicy"]},
   ]},
];

// Per-debate short descriptions for tooltips
const DEBATE_DESC = {
  "Universals vs Particulars":"Are properties like redness, triangularity, or justice real entities that exist independently of the individual things that instantiate them — or are only the particular things real? Plato's theory of Forms held that universals are the true reality; particulars are merely pale copies. Aristotle argued universals are real but only exist in particular things. Ockham's nominalism cut further: universals are just names we apply to similar particulars. The debate matters for mathematics (do numbers exist?), science (are natural kinds real?), and ethics (are moral properties real?).",
  "Hylomorphism":"Every physical substance is a compound of matter (hulê) and form (morphê) — the matter is what something is made of; the form is what makes it the kind of thing it is. A bronze statue and a bronze sphere share the same matter but differ in form. Aristotle used this to explain change: when wood burns, its matter persists but its form is destroyed. Aquinas adapted hylomorphism to explain the soul (the form of the body) and the Eucharist. Does the form/matter distinction survive modern physics, or does it collapse into the distinction between structure and substrate?",
  "Monism vs Pluralism":"Is there ultimately just one kind of fundamental stuff, or genuinely many? Parmenides held that only one undifferentiated being truly exists; change and plurality are illusions. Spinoza's substance monism held that God and Nature are one infinite substance with infinitely many attributes, of which we know two: thought and extension. Leibniz countered with monadology: the world is composed of infinitely many mind-like monads, none of which causally interact. Does science support monism (one type of physical stuff) or pluralism (irreducibly different levels of reality)?",
  "Necessary Connection":"When the billiard ball strikes another and it moves, what exactly happened? Hume's radical empiricist answer: we never perceive any necessary connection between cause and effect — only the constant conjunction of events in our experience. What we call 'causation' is a projection of our psychological habit of expecting the future to resemble the past. Yet science and common sense treat causal laws as necessary. Can the necessity in 'if A then B must follow' be grounded in anything more than observed regularities? This question drives contemporary debates about laws of nature, counterfactuals, and causal realism.",
  "Occasionalism":"How can an immaterial mind move a material body? Descartes never satisfactorily answered this. Malebranche's solution was radical: it can't — only God can be a true cause. When you 'decide' to move your arm, God causes the arm movement on the 'occasion' of your mental state. Every apparent natural cause is merely an occasion for God's direct action. Berkeley's idealism has a similar structure. The position seems to make God the puppet-master of every natural event. Can occasionalism be distinguished from the hypothesis that there are no causes at all — just God doing everything?",
  "Causal Closure":"The physical world is causally closed: every physical event has a sufficient physical cause. This principle, central to physicalist philosophy of mind, seems to leave no room for irreducibly mental causation. If my decision to raise my arm is a mental event that causes arm movement, and arm movement is fully caused by physical events in the brain and muscles, then either the mental event is identical to a physical event (identity theory) or mental causation is redundant (epiphenomenalism). Davidson's anomalous monism tried to preserve both causal closure and mental causation. But does it succeed, or is mental causation an illusion?",
  "Possible Worlds":"Could things have been otherwise? Could you have chosen differently? David Lewis's modal realism answers: yes — and those alternative possibilities are genuine, concrete worlds, as real as the actual world. We are just parochially inclined to call our world 'actual'. This makes modal truths ('it's possible that...', 'it's necessary that...') truths about what happens in other concrete universes. It seems ontologically extravagant — but Lewis argued it is the most economical account of modality. Alternatives include abstractionism (possible worlds are abstract objects or sets of propositions) and ersatzism. What is the nature of possibility and necessity?",
  "Necessary vs Contingent":"Some things could not have been otherwise: mathematical truths, logical laws, the identity of water with H₂O. Others are contingently true: that it is raining, that Napoleon lost at Waterloo. Kripke's crucial insight in 'Naming and Necessity' was that metaphysical necessity (truth in all possible worlds) comes apart from a priori knowability (knowable without experience). 'Water is H₂O' is metaphysically necessary — it could not have been otherwise — yet is knowable only empirically. 'The morning star is the evening star' seems contingent but is in fact necessarily true. This distinction reshapes both metaphysics and epistemology.",
  "Rigid Designation":"When I use the name 'Aristotle', what do I mean? The Russellian theory held that names abbreviate definite descriptions — 'Aristotle' means 'the teacher of Alexander the Great who wrote the Nicomachean Ethics'. But Kripke showed this is wrong: 'Aristotle' refers to the same individual in every possible world, including worlds where Aristotle never taught Alexander. Names are rigid designators — they latch onto their referent directly through a causal chain going back to an original dubbing. This has deep consequences for understanding necessity, identity claims ('Hesperus is Phosphorus'), and the nature of propositional attitudes.",
  "Personal Identity":"What makes you the same person you were ten years ago? The body has changed; the memories have faded or altered; the beliefs, values, and personality have shifted. Locke's memory theory: personal identity consists in psychological continuity, specifically the ability to extend consciousness back via memory. Hume found no persisting self at all — only a bundle of perceptions. Parfit's radical conclusion in 'Reasons and Persons': personal identity is not what matters. What matters is psychological continuity, which can come in degrees and can branch — in fission cases, there may be no fact about whether you survive. Does the self persist, or is it a convenient fiction?",
  "Persistence":"When a table has all its parts gradually replaced, is it the same table? Two rival theories of persistence: endurantism holds that objects persist by being wholly present at each moment of their existence — the table at noon on Monday is numerically identical to the table at noon on Tuesday. Perdurantism (four-dimensionalism) holds that objects are extended through time as well as space — the persisting table is a spacetime worm with distinct temporal parts. Lewis and Sider defend perdurantism; van Inwagen and Haslanger defend endurantism. The dispute connects to questions about personal identity, the nature of change, and the metaphysics of time.",
  "Haecceity":"What makes this individual the very individual it is, rather than a numerically distinct individual that is qualitatively identical in every respect? Could there be two indistinguishable spheres — same size, same colour, same composition — yet two distinct things? Leibniz denied it (his principle of the identity of indiscernibles); Scotus affirmed it via haecceity: a primitive, non-qualitative feature — 'thisness' — that grounds numerical distinctness. Kripke's essentialism gave haecceities a modern form: individuals have de re essential properties that they could not lack across possible worlds. Does the world contain irreducibly individual, non-qualitative facts?",
  "Foundationalism":"Must the regress of justification — every belief justified by another belief — eventually stop somewhere, or is it turtles all the way down? Foundationalism holds that it must stop: there are 'basic' beliefs that are justified without depending on other beliefs — through self-evidence, infallibility, or direct perceptual grounding. Descartes sought indubitability; Aristotle sought self-evident first principles; contemporary foundationalists settle for defeasible prima facie justification. Without a foundation, justification seems to require either an infinite regress, a circular web, or suspension. Does any belief really justify itself, or is the foundationalist picture an illusion of security?",
  "Coherentism":"What if there is no foundation — no bedrock of self-justifying beliefs — but justification still comes from the mutual support of beliefs within a coherent system? Neurath's boat: we are sailors who must repair the ship while at sea, replacing one plank at a time, never stepping onto dry land. A belief is justified by how well it fits with everything else you believe. Hegel's absolute idealism, Bradley's monism, and Quine's web of belief all draw on coherentist themes. The objection: any sufficiently large set of coherent beliefs could be justified, including entirely false ones. How does coherence connect to truth, to the way things actually are?",
  "Reliabilism":"What if justification doesn't require the believer to have access to their reasons at all? Goldman's process reliabilism holds that a belief is justified if and only if it was formed by a cognitive process that reliably produces true beliefs — accurate perception, valid inference, reliable memory. This bypasses the internalism/foundationalism debate: what matters is the external reliability of the process, not the believer's inner evidence. But reliabilism faces the 'new evil demon problem': if a demon produces exactly the same brain states as normal perception, are the demon-victim's beliefs unjustified just because the process is unreliable? Intuitively, they seem epistemically blameless.",
  "Cartesian Doubt":"Could everything you believe be false? Descartes' method of doubt in the Meditations starts with the observation that the senses sometimes deceive, then escalates: perhaps I am dreaming and all perception is illusion; or perhaps an omnipotent evil demon is systematically feeding me false experiences. What survives this radical doubt? The cogito: 'I think, therefore I am.' Even the deceived thinker exists. Descartes then rebuilt knowledge on this foundation, using the existence of God as a guarantee of the reliability of clear and distinct ideas. But is the cogito really certain? Does 'I think' smuggle in more than it proves?",
  "External World":"Is there a physical world outside your mind? Berkeley argued there is not: to be is to be perceived (esse est percipi), and what we call 'matter' is simply the regular order of God-given perceptions. Kant's transcendental idealism offered a more nuanced position: the external world exists but is partly constituted by the mind's forms of intuition (space, time) and categories (causality, substance) — we can never know things as they are in themselves. Moore's common-sense response: here is a hand, and here is another — I know this with more certainty than any sceptical argument. But Moore conceded he could not say how he knew it. Can scepticism about the external world be answered?",
  "Problem of Induction":"The sun has risen every day in human history. Does that give us reason to believe it will rise tomorrow? Hume showed there is no logical justification for inductive inference: the future might resemble the past, or it might not, and experience alone cannot tell us which. Any inductive justification of induction is circular. This is not just an academic puzzle — it threatens the entire rationality of science. Popper's response: science should not try to confirm theories by induction but to falsify them through decisive experiments. But Popper's falsificationism faces its own problems, and Hume's challenge remains without a fully satisfying answer after 300 years.",
  "Innate Ideas":"Do we come into the world with some knowledge already in us, or is the mind at birth a blank slate (tabula rasa)? Plato's theory of recollection: we once knew the Forms, forgot them at birth, and knowledge is really re-discovery. Descartes held that ideas of God, infinity, and mathematical truths are innate — implanted by God, not derived from experience. Leibniz agreed that innate knowledge is in the intellect 'as in marble', awaiting excavation. Locke's empiricist response: there are no innate ideas — everything in the mind came through the senses. The debate has renewed relevance in cognitive science: Chomsky's universal grammar suggests the structure of language is innate. What is the origin of our most fundamental concepts?",
  "Synthetic A Priori":"Can there be knowledge that is both informative about the world (synthetic, not just true by definition) and knowable without experience (a priori)? Kant argued yes, and made this the cornerstone of his critical philosophy. Mathematical truths like '7+5=12' are synthetic (the concept of 12 is not contained in the concept of 7+5) yet a priori (we don't need to count objects to know it). Similarly, 'every event has a cause' is not a logical tautology but is presupposed by all possible experience. Frege and Russell argued that arithmetic is actually analytic — logic plus definitions. Quine attacked the whole distinction. If there is no synthetic a priori, what becomes of mathematics and pure science?",
  "Analytic/Synthetic Divide":"An analytic truth is one true by virtue of meaning alone — 'all bachelors are unmarried' is true because 'bachelor' means 'unmarried man'. A synthetic truth is made true by facts about the world. Kant introduced the distinction; logical positivists used it to separate meaningful claims (empirically verifiable or analytic) from metaphysical nonsense. Quine's 'Two Dogmas of Empiricism' (1951) attacked both this distinction and the verificationist theory of meaning: there is no sharp line between meaning and fact; any statement can be held true in the face of any evidence by making adjustments elsewhere in our web of beliefs. If Quine is right, the distinction that underwrote logical positivism dissolves.",
  "Correspondence Theory":"A belief or sentence is true if and only if it corresponds to the facts — if the world is the way the belief says it is. 'Snow is white' is true just in case snow is white. This is the common-sense view, and Aristotle already stated it: to say of what is that it is, and of what is not that it is not, is true. But what exactly is correspondence? What are facts? How does language 'hook onto' the world? Russell distinguished facts from true propositions. Wittgenstein's Tractatus pictured propositions as logical pictures of atomic facts. The correspondence theory faces the challenge of explaining the correspondence relation without circularity.",
  "Pragmatic Truth":"What is the relationship between truth and usefulness? James proposed that an idea is true if it works — if it proves expedient in practice, if it guides action successfully. 'True is the name of whatever proves itself to be good in the way of belief'. Dewey preferred 'warranted assertibility' — beliefs are true insofar as they survive rigorous empirical inquiry. Peirce offered the convergence theory: the true belief is what the ideal community of inquirers would converge on in the long run. Critics object that pragmatism conflates truth with usefulness: a comforting false belief might 'work' perfectly well. Is truth defined by utility, or is utility an indicator of truth?",
  "Anti-Realism":"What if the truth of a statement cannot outstrip our capacity to verify it? Dummett argued that meaning must be explained in terms of assertibility conditions — conditions we can recognise as obtaining — rather than truth conditions that may obtain beyond all possible evidence. A statement for which we could in principle have no evidence is not determinately true or false. This anti-realist semantics has radical consequences: classical logic (including the law of excluded middle, 'P or not-P') must be abandoned for intuitionistic logic. Anti-realism about the past implies that statements about unwitnessed historical events may lack determinate truth values. Is reality constrained by our epistemic reach?",
  "Consequentialism":"The right action is whatever produces the best outcome. In its utilitarian form — Bentham and Mill — 'best' means greatest aggregate happiness. In preference utilitarianism — Singer and Hare — it means maximum preference satisfaction. Peter Singer's arguments push consequentialism to demanding conclusions: if you can prevent something bad without sacrificing anything of comparable moral importance, you ought to do it — which seems to require radical self-sacrifice for distant strangers. Consequentialism also seems to permit horrifying actions if they maximise welfare — torturing one innocent person to prevent greater suffering. Does morality reduce to the calculus of outcomes, or are there actions that are simply forbidden regardless of consequences?",
  "Deontology":"Some actions are intrinsically right or wrong — not because of their consequences but because of their nature. Kant's deontological ethics grounds morality in reason: the categorical imperative demands that you act only on maxims you could will to be universal laws, and that you always treat persons as ends in themselves, never merely as means. Lying is wrong not because it tends to produce bad outcomes but because a universal law of lying would undermine the very institution of assertion. Ross's prima facie duties pluralised deontology: we have multiple duties (fidelity, gratitude, justice, non-maleficence) that can conflict, and practical wisdom must adjudicate. Can morality be grounded in the rational will alone, independent of all consequences?",
  "Virtue Ethics":"What is the good life? What kind of person should I be? Aristotle's ethics begins not with rules or consequences but with character and flourishing (eudaimonia). A good life is an active exercise of the soul in accordance with virtue — not a state of happiness but an activity. The virtues are stable dispositions that enable excellent human functioning: courage, justice, temperance, practical wisdom. They are acquired by habituation, not rule-following. Anscombe's influential 1958 essay revived virtue ethics as an alternative to consequentialism and deontology. MacIntyre argued that virtues only make sense within a tradition and practice. Can virtue ethics provide determinate guidance in hard cases, or is 'what the virtuous person would do' merely circular?",
  "Moral Realism":"Are there objective moral facts — facts about what is right and wrong that are independent of what anyone thinks or feels? Plato's theory of Forms held that goodness is the highest Form, more real than any physical thing. Moore's intuitionism argued that 'good' is a simple, non-natural property, knowable by moral intuition. Nagel argues that some reasons — especially reasons not to harm others — are objective in the sense that they apply regardless of one's own desires. Parfit's 'On What Matters' argues for a triple convergence of consequentialism, deontology, and contractualism that vindicates moral objectivity. The main challenge: how can moral properties be part of the natural world, and how do we come to know them?",
  "Emotivism":"When you say 'torture is wrong', are you stating a fact — or venting an emotion? Ayer's emotivism held that moral sentences are neither true nor false; they merely express the speaker's attitude ('torture — boo!') or prescribe behaviour to others ('don't torture!'). Stevenson added a persuasive dimension: moral language is partly an attempt to influence others' attitudes. Hare's prescriptivism refined this: moral judgements are universalisable prescriptions. The challenge: emotivism seems to make moral disagreement impossible (how can two people disagree if each is just expressing their own attitude?) and moral progress unintelligible. Does the emotivist account capture the genuine authority that moral judgements claim?",
  "Naturalistic Fallacy":"Can 'good' be defined in terms of natural properties — pleasure, survival, evolutionary fitness, preference satisfaction? Moore's open question argument says no: for any proposed natural definition of 'good', it always makes sense to ask 'but is that thing good?' — which shows the definition is not analytic. You cannot derive 'ought' from 'is' (Hume's law): no description of natural facts logically entails a moral conclusion. The naturalistic fallacy is committed whenever a moral conclusion is derived purely from non-moral premises. But is Moore's argument conclusive? Naturalists reply that many concepts resist explicit definition without thereby being indefinable in principle. Is the gap between fact and value absolute?",
  "Free Will vs Determinism":"If every event — including your decisions — is the inevitable result of prior causes and the laws of nature, are you truly free? Hard determinism says no: freedom is an illusion. Libertarianism (about free will) says yes: free actions are uncaused by prior conditions, involving a special kind of agent causation. Compatibilism — the dominant view since Hume — argues that freedom and determinism are compatible: freedom worth wanting is not freedom from causation but freedom from compulsion and coercion. Frankfurt cases suggest that the ability to do otherwise is not even necessary for moral responsibility — what matters is whether you acted from your own desires. Does neuroscience settle this question, or does it presuppose the very determinism it claims to discover?",
  "Moral Luck":"How much of your moral worth is a matter of luck? Bernard Williams and Thomas Nagel independently argued in 1976 that moral judgement is pervasively affected by factors entirely outside the agent's control. Resultant luck: the drunk driver who kills a child is judged more harshly than the equally reckless driver who happens not to. Circumstantial luck: had you been born in Nazi Germany you might have been a perpetrator rather than a victim. Constitutive luck: your character, temperament, and capacity for virtue are largely unchosen. Kant insisted that moral worth depends only on the will — what is entirely in our power. But if Nagel and Williams are right, this ideal of pure moral worth may be unattainable. Does moral luck undermine the entire practice of blame and praise?",
  "Autonomy":"What does it mean to be truly self-governing — to act from your own reasons rather than from external compulsion or internal compulsion? Kant held autonomy to be the foundation of morality: the moral law is the law that rational agents give to themselves through pure practical reason, free from inclination and desire. Heteronomy — being governed by anything other than pure reason — is the enemy of morality. Mill's liberal autonomy is more modest: individuals should be free to live as they choose in their own sphere, subject only to the harm principle. Frankfurt distinguished first-order desires (wanting to smoke) from second-order desires (wanting to want not to smoke) — autonomy requires alignment between the levels. Can autonomy be fully realised in a deterministic world?",
  "Animal Rights":"Do animals have rights? Singer's utilitarian argument is powerful: if pain matters morally, and animals can suffer, then their suffering must be counted equally with human suffering. The capacity for suffering — sentience — not rationality or species membership is the criterion of moral considerability. 'Speciesism' — discriminating on the basis of species — is as arbitrary as racism or sexism. Regan's rights-based approach goes further: animals that are 'subjects of a life' — that have beliefs, desires, perception, memory, emotional life — have inherent value that cannot be traded off against aggregate utility. Kant denied animals direct moral status (no rationality, no rights). Does our treatment of animals represent one of the great moral failures of our time?",
  "Global Poverty":"Does your wealth create an obligation to give to those in extreme poverty? Singer's famous argument: if you walked past a drowning child in a shallow pond, you would be obligated to save the child at small cost to yourself. The fact that the child is in another country changes nothing morally relevant. Affluent people who fail to give enough to prevent preventable deaths are, on this view, as culpable as someone who watches a child drown. Rawls's Law of Peoples was more restrictive about global redistribution. Pogge argued that wealthy nations are not merely failing to help but are actively harming the global poor through unjust international structures. How demanding is morality — and can it really require sacrificing your own prosperity to help strangers?",
  "Bioethics":"What do we owe to those at the margins of life — the unborn, the severely ill, the dying? When is it permissible to end a life, to create one artificially, or to enhance one genetically? Abortion raises the question of personhood and the moral status of foetuses. Euthanasia pits personal autonomy against the sanctity of life and the duties of care. Genetic enhancement raises questions about justice (who has access?), identity (is an enhanced person still the same person?), and human nature (is there something to be preserved?). Singer's principle of equal consideration of suffering applies to infants and severely cognitively impaired individuals in ways that challenge conventional moral categories. Where do the boundaries of the moral community lie?",
  "Predicate Logic":"Aristotle's syllogistic — all men are mortal; Socrates is a man; Socrates is mortal — captured an important class of inferences but missed many. Frege's Begriffsschrift (1879) was the first fully adequate logical notation. Predicate logic introduces quantifiers — 'for all x' (∀x) and 'there exists an x' (∃x) — and the function-argument structure of propositions. This allows precise representation of 'every even number greater than 2 is the sum of two primes'. Russell and Whitehead's Principia Mathematica used predicate logic to attempt the logicist reduction of all mathematics. Today predicate logic underlies computer science (database queries, programming languages), linguistics (formal semantics), and all rigorous philosophical argumentation. What can and cannot be expressed in first-order logic?",
  "Modal Logic":"How can we reason formally about possibility and necessity? Modal logic adds two operators to classical logic: □ (necessarily) and ◇ (possibly). Leibniz was the first to connect necessity to truth in all possible worlds. Modern possible-worlds semantics, developed by Kripke in the 1960s, gave modal logic a rigorous mathematical foundation: □P is true at a world w iff P is true at every world accessible from w. Different accessibility relations yield different modal systems (S4, S5, etc.). Modal logic has applications throughout philosophy: analysing counterfactuals ('if that match had been struck, it would have lit'), expressing metaphysical necessity, and formalising deontic ('ought') and epistemic ('knows that') operators.",
  "Type Theory":"What went wrong with Frege's logic, and how can it be fixed? Russell's paradox — the set of all sets that don't contain themselves — showed that unrestricted comprehension (for any condition, there is a set of all things satisfying it) is inconsistent. Russell's solution: a hierarchy of types. Objects are of type 0; sets of objects are type 1; sets of sets of objects are type 2; and so on. A predicate of type n can only be applied to entities of type n−1. Self-reference is blocked because no set can contain itself — sets can only contain entities of lower type. Type theory became the foundation of Whitehead and Russell's Principia and is the ancestor of modern type systems in programming languages. Is type theory the right response to paradox, or merely a technical patch?",
  "Logicism":"Can all of mathematics be reduced to pure logic — with no special mathematical axioms, only logical laws plus definitions? Leibniz dreamed of this; Frege attempted it in the Grundgesetze. Numbers, on Frege's account, are logical objects: the number 2 is the extension of the concept 'equinumerous with a standard two-membered set'. Russell and Whitehead's Principia pursued the project after Russell's paradox forced revisions. But the Axiom of Infinity — which postulates the existence of infinitely many objects — seems not to be a logical truth but a mathematical assumption. Quine later argued that mathematics is continuous with empirical science, not reducible to logic. Is there a boundary between logic and mathematics, and if so, where does it lie?",
  "Formalism":"Mathematics is a formal game: a set of symbols and transformation rules, with no inherent meaning. Hilbert's programme aimed to axiomatise all of mathematics in a finite, consistent system and then prove its consistency by purely finitary methods — methods whose validity no one could doubt. This would put all of mathematics on a secure foundation, immune to paradox. Gödel's two incompleteness theorems of 1931 devastated this vision: any consistent formal system strong enough to express basic arithmetic contains true statements that cannot be proved within the system; and no such system can prove its own consistency. Does mathematics need foundations at all, or is the search for foundations a philosophical illusion?",
  "Intuitionism":"Is a mathematical statement true if it has never been proved and cannot, even in principle, be proved? Brouwer's intuitionism said no: mathematical truth is not discovered but constructed by the human mind. A statement is true only if there is a mental construction that proves it; false only if there is a construction that refutes it; and neither if neither construction exists. This requires abandoning classical logic: the law of excluded middle ('P or not-P') fails for undecidable statements — you cannot assert 'the 10,000th digit of π is either 7 or not 7' without knowing which. Dummett gave intuitionism a linguistic turn: meaning must be explained in terms of proof conditions, not truth conditions that may obtain beyond all evidence. Does mathematics describe a mind-independent realm, or is it a human creation?",
  "Russell's Paradox":"Consider the set of all sets that do not contain themselves. Does it contain itself? If yes, it doesn't (by definition). If no, it does (by definition). Either answer is contradictory. Russell discovered this paradox in 1902 and immediately wrote to Frege, who was about to publish the second volume of his Grundgesetze — the culmination of his logicist programme. Frege's response was one of intellectual tragedy: 'Scarce anything can be more unwelcome to a scientific writer than to have one of the foundations of his edifice shaken after the work is finished.' The paradox showed that naive set theory — any condition defines a set — is inconsistent. It forced the development of type theory, axiomatic set theory (ZFC), and fundamentally changed the foundations of mathematics.",
  "Liar Paradox":"Consider the sentence: 'This sentence is false.' If it's true, then what it says is the case — it's false. If it's false, then what it says is not the case — it's true. Either way, we have a contradiction. The paradox is ancient (attributed to Epimenides the Cretan: 'All Cretans are liars'), but its modern form was made precise by Russell and others. Tarski's solution: a language cannot consistently contain its own truth predicate. Truth can only be defined in a meta-language that stands above the object language. This stratification blocks the paradox but raises new questions about the unity and hierarchy of language. Kripke and Priest have proposed alternative approaches — fixed-point theories and dialethism (accepting true contradictions).",
  "Sorites Paradox":"Is a man with one hair bald? Yes. Does adding one hair make someone non-bald? No — one hair cannot make the difference. But then someone with a million hairs is bald, which is absurd. The sorites (from the Greek 'heap') shows that classical logic is unstable for vague predicates. The principle of tolerance — one unit cannot make a difference to the application of a vague predicate — combined with classical logic produces false conclusions from true premises. Responses include: rejecting tolerance (there is a sharp but unknowable boundary — epistemicism); adopting degrees of truth (fuzzy logic); accepting true contradictions (dialethism); or abandoning vague predicates from serious discourse. Can vagueness be explained, or is it a fundamental feature of language that no logic can fully capture?",
  "Hard Problem":"Imagine completing all of neuroscience — knowing every neural correlate of every conscious experience, every mechanism of perception and cognition. Would that explanation tell you why there is something it is like to be conscious? Chalmers argues no: even a complete functional and physical account leaves open why all that neural activity is accompanied by subjective experience — by the felt quality of seeing red, the ache of longing. This is the hard problem of consciousness, distinct from the 'easy problems' of explaining cognitive function. Dennett's heterophenomenology argues there is no hard problem — our intuitions about qualia are systematically mistaken. Jackson's 'knowledge argument': Mary, confined to a black-and-white room, knows all physical facts about colour — yet when she leaves, she learns something new. Is consciousness a fundamental feature of the universe?",
  "Qualia":"What is the subjective feel of experience — the redness of red, the painfulness of pain, the taste of coffee? These qualitative, phenomenal properties of experience are called qualia. They seem to be intrinsically private, directly known only to the subject, and irreducible to any functional or physical description. Nagel's famous question: what is it like to be a bat? Even if we knew everything about bat brains and behaviour, we might still not know the subjective character of echolocation. Dennett argues qualia are a confused philosophical concept — there is no 'what it's like' over and above the functional states. Chalmers argues qualia are the real data that physicalist theories of mind must account for but cannot. Are qualia real, and if so, how do they fit into a physical universe?",
  "Phenomenal Concepts":"Even if qualia are physical, why do we think about them in a special way that makes physicalism seem false? The phenomenal concepts strategy argues that the hard problem arises from the unusual way we think about our own experiences — we have direct, recognitional concepts of them (THIS EXPERIENCE) that are independent of any physical concept. The conceivability of zombies (beings physically identical to us but without experience) is explained by this conceptual gap, not by a genuine metaphysical gap. Mary learns something new not because she gains new knowledge of non-physical facts but because she acquires a new phenomenal concept of a physical state she already knew under a physical description. Does this strategy dissolve the hard problem, or merely defer it?",
  "Mental Representation":"How do mental states manage to be about things — to represent the world as being a certain way? The Language of Thought hypothesis (Fodor) proposes that mental representations are syntactically structured mental symbols, processed by computational operations. Teleosemantics (Millikan, Dretske) grounds representation in biological function: a mental state represents whatever it has the biological function of tracking. Causal-informational theories hold that mental states represent what they are reliably caused by under optimal conditions. The challenge for all theories: explaining misrepresentation. A thermostat reliably registers temperature — but does it represent temperature? What distinguishes genuine mental representation from mere reliable correlation?",
  "Content Externalism":"What I mean by my words is not entirely determined by what is in my head. Putnam's Twin Earth thought experiment: imagine a planet exactly like Earth except that the liquid in the oceans and rivers is not H₂O but XYZ — it looks, tastes, and behaves identically. Earth people say 'water'; Twin-Earth people say 'water'. But they mean different things — because meaning is partly determined by the actual natural kind in the environment. Burge's social externalism extends this: even within a community, what I mean by 'arthritis' depends partly on the community's standard usage, not just on my individual beliefs. The content of thought is not 'in the head'. What are the implications for psychology, for philosophy of mind, for self-knowledge?",
  "Aboutness":"The most basic feature of mentality: that mental states are directed toward objects or states of affairs. A belief is always a belief that P; a desire is always a desire for X. Brentano revived this medieval notion as the defining mark of the mental: intentionality is what distinguishes the mental from the physical. Physical things like rocks just are — they don't represent or mean anything. Mental states, in contrast, point beyond themselves. But how can a purely physical brain state be about something? How can it be about something that doesn't exist — a belief about Santa Claus, a desire for peace? Husserl built phenomenology on the analysis of intentional structure. Anscombe and Frege gave intentionality a central role in action theory and the philosophy of language.",
  "Substance Dualism":"Mind and body are two entirely different kinds of substance: res cogitans (thinking substance, the mind) is unextended and non-spatial; res extensa (extended substance, matter) is non-thinking and spatial. Descartes held this view and grounded the difference in the essential attributes of each substance. But this immediately generates the interaction problem: how can an unextended, non-spatial mind cause a spatial body to move? Princess Elizabeth of Bohemia pressed this question in correspondence with Descartes; his answer was unsatisfying. Malebranche and Leibniz proposed alternatives (occasionalism and pre-established harmony) that avoided direct interaction at the cost of making causation indirect or illusory. Does dualism capture something real about the difference between mind and matter, or is the interaction problem fatal?",
  "Physicalism":"Everything that exists is physical — or is realised by, supervenes on, or is determined by the physical. The mind is not something over and above the brain: mental states are brain states, or they are functionally realised by brain states. Type identity theory (Smart, Place) identified mental state types with brain state types: pain = C-fibre firing. Token identity theory allowed mental state tokens to be brain state tokens without type identification. But multiple realisability (pain can be realised in very different physical systems — humans, octopuses, perhaps silicon) suggests that types don't reduce. Nonreductive physicalism preserves the reality of mental properties while insisting they supervene on physical properties. Can physicalism account for consciousness, or does the hard problem show that experience goes beyond the physical?",
  "Functionalism":"What is pain — really? The functionalist answer: pain is not any particular physical state but whatever state is caused by tissue damage, causes avoidance behaviour, and interacts with other mental states in the characteristic way. Mental states are defined by their causal-functional roles, not by what they are made of. A silicon robot in the right functional organisation would be in pain just as you are. This 'multiple realisability' made functionalism attractive: it avoids the chauvinism of type identity theory (which implies only carbon-based brains can have minds) without embracing dualism. The challenge: does functionalism leave out the feel of experience? Ned Block's 'China brain' — imagine the population of China organised to realise the functional organisation of your brain — seems to lack phenomenal consciousness. Can function capture qualia?",
  "Distributive Justice":"How should the benefits and burdens of social cooperation be distributed? Utilitarian distribution: whatever allocation maximises aggregate welfare. But this can justify severe sacrifices of the few for the many. Rawls's theory of justice as fairness: principles chosen behind a veil of ignorance (not knowing your place in society) yield equal basic liberties and the difference principle — inequalities are just only if they benefit the least advantaged. Nozick's entitlement theory: any distribution arising from just acquisitions and voluntary transfers is just, regardless of the pattern. Marx's communist ideal: from each according to ability, to each according to need. Is there a principled basis for choosing between these accounts, or does distributive justice inevitably reflect contested values about freedom, equality, and desert?",
  "Natural Rights":"Are there rights that persons possess prior to and independently of any government or social arrangement — rights that no legitimate authority may violate? Locke argued yes: life, liberty, and property are natural rights arising from our status as rational, self-owning beings. These rights constrain governments: a government that violates them forfeits its claim to obedience. Jefferson's Declaration drew directly on this tradition. Hobbes had a different view: in the state of nature every person has a right to everything — which is essentially no rights at all — and political rights are created by the social contract, not discovered in nature. Nozick's 'Anarchy, State, and Utopia' updated Lockean natural rights theory: the minimal state is the most extensive state that can be justified. Can rights be genuinely natural, or are they always social constructions?",
  "Difference Principle":"Among the principles of justice that Rawls derives from the original position, the difference principle is the most distinctive and controversial: social and economic inequalities are just only if they are to the greatest benefit of the least advantaged members of society. This is not egalitarianism — it permits substantial inequality — but it makes the position of the worst-off the criterion of justice. Incentive inequalities that make even the worst-off better off than they would be under strict equality are permitted. G.A. Cohen objected that truly just citizens would not need incentives — the difference principle accommodates an unjust ethos. Rawls responded that it applies to the basic structure of institutions, not individual choices. Does the difference principle capture what justice requires, or is it too demanding, or not demanding enough?",
  "Social Contract":"The most influential tradition in political philosophy: legitimate political authority is grounded in a contract, agreement, or rational consent of the governed. Hobbes: in the state of nature (no government, no law) life is 'solitary, poor, nasty, brutish, and short'. Rational individuals agree to surrender unlimited freedom to a sovereign in exchange for security. Locke's contract is more limited: government holds power in trust; if it violates natural rights, the people may dissolve it. Rousseau's general will: the social contract creates a collective moral person whose will represents the common interest, not merely the sum of private interests. Rawls revived the contract tradition with hypothetical consent: just principles are those that would be chosen by rational agents behind a veil of ignorance. Can an actual state be legitimate if its citizens never literally consented?",
  "Consent":"What grounds political obligation — the duty to obey the law and support just institutions? The most natural answer is consent: you are obligated because you agreed. Locke distinguished express consent (explicit oath or declaration) from tacit consent (enjoying the benefits of protection while living in a territory). Hume objected devastatingly: most people never had a choice about where they were born; staying in a country when leaving is prohibitively costly is not meaningful consent. Rawls replaced actual consent with hypothetical consent: just principles are those that would be consented to under fair conditions. But can hypothetical consent ground real obligations — if you would have agreed, but didn't, are you actually bound? The problem of political obligation remains one of the hardest in political philosophy.",
  "Civil Disobedience":"When, if ever, is it morally permissible — or even required — to break the law in order to protest injustice? MLK's 'Letter from Birmingham Jail' argued that unjust laws have no claim on conscience. Rawls defined civil disobedience as public, nonviolent, conscientious yet political action contrary to law, aimed at bringing about a change in law or government policy. It is justified, on Rawls's account, when legal channels have been exhausted, the injustice is serious and clear, and the protest is proportionate. Kant was more restrictive: legal revolution is a contradiction in terms — once you accept the authority of law, you cannot selectively disobey. Is there a principled line between justified civil disobedience and criminality, or is the distinction always politically contested?",
  "Positive vs Negative Freedom":"Isaiah Berlin's 'Two Concepts of Liberty' (1958) distinguished two fundamentally different answers to the question 'What is freedom?' Negative freedom: freedom from interference — you are free to the extent that no other person or institution coerces or constrains your actions. This is Mill's liberal tradition; Nozick's libertarianism is its extreme form. Positive freedom: freedom to — the capacity to be the author of your own life, to realise your own will, to govern yourself. Rousseau, Hegel, and Marx drew on positive freedom; Berlin warned it could be corrupted to justify tyranny ('we liberate you from your false consciousness'). Rawls argued that real equal liberty requires fair value — formal freedom without material resources is hollow. Which concept should underpin a theory of justice?",
  "Harm Principle":"The only legitimate ground for coercing an individual is to prevent harm to others — not their own good, not moral disapproval, not offence, not paternalism. Mill stated this in 'On Liberty' as the fundamental principle of liberal politics. It generates a sharp distinction between self-regarding actions (where the individual is sovereign) and other-regarding actions (where society may legitimately intervene). But the harm principle is notoriously difficult to apply: almost any action can be said to harm someone, somehow. Does selling unhealthy food 'harm' the buyer? Does offensive speech harm those who hear it? Feinberg extended the principle to include serious offence; Devlin argued that morality itself is a public good that society may protect. How should liberal societies draw the line between liberty and legitimate regulation?",
  "Republicanism":"The republican tradition — from Cicero through Harrington to Pettit — offers a conception of freedom as non-domination rather than non-interference. On this view, a slave who is treated kindly by an enlightened master is not free: the mere possibility of arbitrary interference constitutes domination, even if the master never exercises it. This is more demanding than Berlinian negative liberty: one can be free from actual interference while being dominated, and dominated without being actually interfered with. Pettit argues that republican freedom requires not just limiting government power but ensuring that government acts in a non-arbitrary, accountable way — that citizens can contest decisions. How does republican freedom differ from liberal freedom in practice, and which is more politically adequate?",
  "Sense vs Reference":"When you say 'the morning star' and 'the evening star', you are referring to the same planet — Venus. Yet the two expressions seem to mean different things: one picks out Venus as the heavenly body visible in the morning, the other as the one visible in the evening. Frege's fundamental distinction: every name or expression has both a reference (the object it picks out — Venus) and a sense (the mode of presentation through which it picks out that object — 'the heavenly body visible at dawn'). The same reference can be given under different senses; different expressions can share a sense. This distinction is the foundation of the philosophy of language and spawned the debates between description theories (Russell) and causal theories (Kripke) of reference that dominated 20th-century analytic philosophy.",
  "Semantic Externalism":"What you mean is not entirely determined by what is in your head. Putnam's Twin Earth: on a planet exactly like Earth, the word 'water' applies to XYZ — a substance chemically distinct from H₂O but otherwise identical. Earth speakers and Twin-Earth speakers have the same internal states when they use 'water'. Yet they mean different things — because meaning is partly constituted by the actual substance in the environment. Putnam's slogan: meanings just ain't in the head. Burge extended this to social externalism: what you mean by 'arthritis' depends partly on the standard usage of your community, even if you have idiosyncratic beliefs about it. Externalism challenges the Cartesian picture of mind as self-contained and raises deep questions about self-knowledge: do you know what you mean?",
  "Use Theory":"What is the meaning of a word? Not a mental image, not a Fregean abstract object — but its use in practice. Wittgenstein's later philosophy rejected his earlier picture theory of meaning and replaced it with the injunction to 'look at the use'. Words are like tools: they have functions, not hidden essences. 'The meaning of a word is its use in the language.' This makes meaning a social and practical phenomenon, embedded in forms of life and language games — the varied ways of using language woven into human activity (reporting, commanding, asking, joking, etc.). There is no private language: meaning requires public criteria of correct use. The use theory challenges theories that ground meaning in inner mental states and raises questions about rule-following: can any rule uniquely determine its correct application?",
  "Performatives":"Not all sentences describe how things are — some sentences do things. Austin's discovery of performatives: when a judge says 'I sentence you to ten years', they are not describing a sentencing but performing one. When a bride says 'I do', she is not reporting a promise but making one. Austin called these 'speech acts' — the utterance itself is the action. He distinguished felicitous performatives (which succeed) from infelicitous ones (which misfire, because the wrong person said them, or in the wrong context, or without the right intention). The theory of speech acts was developed by Searle into a taxonomy of illocutionary acts (assertions, directives, commissives, expressives, declarations) and has influenced linguistics, cognitive science, and social theory. Does all language ultimately rest on a bedrock of action?",
  "Illocutionary Force":"When you say 'It's cold in here', you might be reporting the temperature, requesting that the window be closed, or complaining about the heating. The same sentence can be used to perform different illocutionary acts — acts performed in saying something, as opposed to the meaning of what is said (locutionary act) or the effects on the hearer (perlocutionary act). Illocutionary force is conveyed partly through the semantic content of the sentence and partly through context, tone, and convention. Austin's taxonomy of illocutionary acts — verdictives, exercitives, commissives, behabitives, expositives — was refined by Searle and has been further developed in formal pragmatics. How does context determine which speech act is performed, and what are the social and institutional conditions that make speech acts succeed?",
  "Conversational Implicature":"Language communicates far more than it literally says. When you ask someone 'Do you know what time it is?' and they say 'Yes', you feel misled — the implicature was that they would tell you the time. Grice explained such phenomena through conversational maxims: be as informative as required (Quantity); say only what you believe and have evidence for (Quality); be relevant (Relation); be clear (Manner). Violations of these maxims generate implicatures — extra meanings that the hearer must infer to make the utterance cooperative. Grice's framework separates what is said (semantic content) from what is implicated (pragmatic inference). It has been enormously influential in linguistics, philosophy of language, and cognitive science. Does all conversational meaning reduce to Gricean inference, or are there forms of communication that resist this analysis?",
  "Tarskian Truth":"How can truth be defined without circularity? Tarski's semantic conception of truth provides a materially adequate and formally correct definition through the T-schema: 'Snow is white' is true if and only if snow is white. Truth is defined metalinguistically: we define truth for sentences of the object language from a richer meta-language. This allows truth to be a genuine predicate without generating the Liar paradox (which requires a language to contain its own truth predicate). Tarski's definition is disquotational — saying that a sentence is true is just another way of asserting the sentence. Davidson used Tarski's theory as the core of a theory of meaning: to understand a sentence is to know its truth conditions. Is truth a substantive property, or is the T-schema all there is to it?",
  "Radical Interpretation":"Imagine you encounter a community whose language you don't know at all. What assumptions must you make to begin interpreting them? Davidson argued that you must attribute mostly true and rational beliefs: radical interpretation requires the principle of charity. If the speakers' sentences were connected to the world in ways you couldn't understand at all, you couldn't get started. The principle of charity is not just a methodological convenience but constitutive of meaning: what makes a belief the belief it is is its inferential and causal role in a network of mostly rational, mostly true beliefs. This holism about meaning implies there is no sharp boundary between meaning and belief — Quine's lesson about the analytic/synthetic distinction applied to interpretation. Can there be meaning without massive agreement?",
  "Indeterminacy":"Is there a fact of the matter about which of many possible translation schemes correctly translates a foreign language? Quine's famous thought experiment of radical translation argues no. The 'rabbit' problem: a native points at a rabbit and says 'Gavagai'. The linguist translates 'Gavagai' as 'rabbit'. But it might equally mean 'undetached rabbit parts', 'rabbit-stage', or 'rabbithood'. Any such translation is consistent with all possible behaviour. The inscrutability of reference — there is no behavioural evidence that determines what expressions refer to — leads to the ontological relativity thesis: what objects a theory is about cannot be stated except relative to some background theory. This is a radical conclusion: meaning and reference are not objective features of language that a perfect theory could capture.",
  "Subjective vs Objective Beauty":"When you call a sunset beautiful, are you saying something about the sunset or about your own experience? The empiricist tradition — Hutcheson, Hume — held that beauty is a secondary quality: like colour, it consists in the disposition to produce certain responses in suitably positioned observers. But Hume also thought there were standards of taste: the qualified critic's verdict is more reliable. Plato held that beauty is an objective property — a Form — that beautiful things imperfectly instantiate. Kant's Critique of Judgement attempted a middle path: the judgement of taste is subjective (based on feeling, not concept) yet claims universal validity — when I say 'this is beautiful' I am not just saying I like it but claiming it merits universal agreement. Is there a standpoint from which the beautiful can be objectively recognised, or is beauty irreducibly in the eye of the beholder?",
  "Disinterested Pleasure":"To judge beauty aesthetically, Kant argued, you must be disinterested — your pleasure in the object must be independent of any desire for it, any interest in its existence, any concern for its usefulness or moral approval. The beauty of a palace is appreciated aesthetically only when you bracket questions of whether you want to own it, whether it was built by slave labour, whether it serves a useful purpose. This disinterestedness distinguishes aesthetic pleasure from the pleasant (which pleases through gratification of desire) and the good (which pleases through rational approval). Schopenhauer extended this: aesthetic contemplation is momentary escape from the tyranny of the will — the only genuine respite from suffering. But is disinterested pleasure really possible, and is it the only or best aesthetic attitude?",
  "The Sublime":"The sublime is distinct from the beautiful: it is the experience of the vast, the overwhelming, the terrifying in nature — a mountain range, a thunderstorm, the starry sky. Burke, in 'A Philosophical Enquiry into the Origin of our Ideas of the Sublime and Beautiful', grounded the sublime in fear modified by safety. Kant gave the sublime a moral significance: when overwhelmed by nature's power, we initially feel our smallness — but then recognise that our rational nature transcends the physical world. The dynamically sublime (a raging torrent) reveals our moral supersensible nature; the mathematically sublime (infinite space) reveals our capacity to think the infinite. Schopenhauer saw the sublime as momentary triumph over the will. Nietzsche valued the Dionysian — the experience of overwhelming creative and destructive power — as the foundation of tragic art. Does the sublime reveal something about the human condition that the beautiful does not?",
