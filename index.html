  "Art as Truth Disclosure":"Can art reveal truths about the world that philosophy and science cannot? Heidegger's 'The Origin of the Work of Art' argued that great art — Van Gogh's painting of peasant boots, a Greek temple — 'sets up a world' and 'sets forth the earth': it opens a historical world of meaning and simultaneously reveals the resistant, inexhaustible materiality of the earth. Art discloses the truth of things in a way that conceptual knowledge cannot. Hegel saw art as a sensuous embodiment of Absolute Spirit — inferior to philosophy but revealing truth through the particular. For Nietzsche, art is the supreme affirmation of existence: tragedy, by presenting suffering aesthetically, says Yes to life. Can a painting or poem actually show you something true that an essay or experiment cannot?",
  "Expression Theory":"Art is the expression of emotion — but not mere venting. Collingwood distinguished art from craft, entertainment, and magic: genuine art is the clarification of an emotion through the act of expression. The artist does not know in advance what emotion they are expressing; the work of art is the process of discovering it. Croce's idealism held that the work of art is entirely in the artist's mind — the physical canvas or score is merely a vehicle. Adorno's critical theory gave expression a social dimension: authentic art preserves genuine emotional experience against the administered world of the culture industry, which commodifies feeling. Expressionism in music (Schoenberg, Berg) and art (Munch, Kirchner) made the expression of inner experience the defining aesthetic goal. Can expression be the whole story about art?",
  "Institutional Theory":"What makes something a work of art? Not any intrinsic property — not beauty, expressiveness, or formal unity. Dickie's institutional theory holds that a work of art is an artifact that has had the status of candidate for appreciation conferred upon it by a person acting on behalf of the artworld. The artworld is the social institution — the network of artists, critics, curators, museums, galleries, publications — that determines what counts as art. Duchamp's readymades (a urinal submitted to an exhibition as 'Fountain') dramatised this: institutional recognition, not intrinsic properties, determines art status. The theory explains why avant-garde works that initially seem not to be art eventually become art: the artworld has accepted them. But does the institutional theory make art arbitrary? Can anything become art if the right people say so?",
  "Mimesis":"Art imitates. Plato's dialogues present mimesis as philosophically dangerous: the painter imitates the appearance of a bed, which is itself a copy of the Form of bed — art is three removes from reality, trafficking in illusion, appealing to the lower parts of the soul. Republic Book X is a sustained indictment of the poets. Aristotle's Poetics rehabilitated mimesis: tragic imitation is not mere copying but a representation of possible actions — 'what could happen' — which is why poetry is more philosophical than history. Tragedy produces catharsis: the purgation or clarification of pity and fear through the aesthetic experience of witnessing them. The imitation theory remained dominant through the Renaissance and neoclassicism. Does art essentially involve representation, or can purely abstract art be genuine art?",
  "Symbol & Metaphor":"Is representation a matter of resemblance, or of symbolic convention? Goodman's 'Languages of Art' argued that representation is not resemblance: a realistic painting of a man no more resembles a man than the word 'man' does. Representation is a symbol relation governed by a system of conventions. What makes an image representational is its function within a symbol system, not any intrinsic likeness to its subject. Metaphor works similarly: calling a man a wolf does not describe a resemblance but reorganises how we perceive the man, importing aspects of our understanding of wolves. Black's interaction theory: metaphor creates a new way of seeing rather than merely expressing a pre-existing comparison. Is all artistic representation irreducibly conventional, or are some forms of representation natural?",
  "Aesthetic Experience":"What is distinctive about the experience we have when engaging with art or natural beauty? Dewey argued in 'Art as Experience' that aesthetic experience is not a separate faculty but ordinary experience brought to consummation — unified, coherent, having the quality of completeness that most experience lacks. He criticised the 'museum conception' of art that separates aesthetic objects from the stream of life. Kant saw aesthetic experience as a free play of imagination and understanding — neither the determination of a concept nor the gratification of desire. Schopenhauer saw it as temporary will-less contemplation, the only genuine respite from suffering. Bell and Fry argued that significant form — purely formal relationships — produces a distinctive aesthetic emotion independent of content. Can aesthetic experience be fully described, or does it always resist conceptual capture?",
  "Ontological Argument":"Can the existence of God be established by pure reason alone, from the concept of God, without any appeal to experience? Anselm in the Proslogion defines God as 'that than which nothing greater can be conceived'. A being that exists in reality is greater than one that exists only in the mind. Therefore, if God existed only in the mind, something greater — a real God — could be conceived. But that contradicts the definition. So God must exist in reality. Descartes offered a simpler version: existence is a perfection; God is the most perfect being; therefore God exists. Kant's famous objection: existence is not a predicate — saying that something exists adds nothing to the concept of it. Gaunilo's island parody: we could similarly 'prove' the existence of a perfect island. Is the ontological argument a genuine proof or a magnificent philosophical conjuring trick?",
  "Cosmological Argument":"Why does anything exist at all? The cosmological argument infers a first cause or necessary being from the contingent existence of the universe. Aquinas's Five Ways include: every thing in motion is moved by something else; this regress cannot go on forever; therefore there is an Unmoved Mover. Everything that exists contingently depends for its existence on something else; this regress must terminate in a being that exists necessarily — God. Leibniz added the Principle of Sufficient Reason: there must be a sufficient reason for the world's existence, which must lie outside the contingent world itself. Hume's objection in the Dialogues: why must the regress stop? Why cannot the universe itself be the necessary being? Does the argument work, or does it merely push the question of existence back one step?",
  "Design Argument":"The universe — and especially living organisms — displays the marks of purposive design: complex, integrated structures adapted to function. Paley's analogy: finding a watch on a heath, you would infer a watchmaker; the eye is incomparably more complex. Aquinas's Fifth Way: things without intelligence act toward ends — this requires an intelligent director. Hume's 'Dialogues Concerning Natural Religion' demolished the argument: the universe might be more like a vegetable than a machine; multiple designers or an imperfect designer might be inferred; and the analogy between human artifacts and the universe is too weak to bear the weight of the conclusion. Darwin's theory of natural selection provided a non-intentional explanation for the apparent design of organisms. Does fine-tuning of the physical constants restore the argument at the cosmological level?",
  "Faith Seeking Understanding":"Is religious faith the enemy of reason, or its precondition? Anselm's motto — 'credo ut intelligam' (I believe in order to understand) — holds that faith is not opposed to reason but enables its exercise. We cannot understand what we do not first believe; reason illuminates and develops what faith already holds. Aquinas built a synthesis: natural reason can demonstrate some truths about God (that he exists, that he is one), while revealed truths (the Trinity, the Incarnation) exceed reason but are not contrary to it. Augustine had proposed a similar order: 'Unless you believe, you will not understand.' This tradition sees faith and reason as complementary rather than opposed. But is this coherent? Can a commitment of faith ever be revised by rational argument, or does it stand above criticism?",
  "Leap of Faith":"For Kierkegaard, genuine faith in the God of Abraham — the God who commanded Isaac's sacrifice — cannot be rationally justified. It is not the conclusion of an argument but a passionate, individual, inward appropriation of a relation to the absolute that transcends the ethical and the rational. The 'absurd' is not a defect to be overcome but the very character of genuine faith: Abraham believed by virtue of the absurd that God would restore Isaac. The leap of faith is a movement that reason can neither perform nor prepare for. Against this, Clifford's evidentialism: 'It is wrong always, everywhere, and for anyone to believe anything upon insufficient evidence.' James's 'The Will to Believe' replied: where the evidence is insufficient and the stakes are high and the choice is forced, you are entitled to believe. Can faith be rational?",
  "Reformed Epistemology":"Must religious belief be supported by evidence and argument to be rational? Reformed epistemologists say no. Plantinga argues that belief in God can be 'properly basic' — rationally held without being inferred from other beliefs, just as beliefs formed through perception ('I see a tree'), memory, or self-evidence are properly basic. The demand for evidential justification of all beliefs leads to an infinite regress. Moreover, the classical theistic proofs and evidences are not what ground most believers' faith; the belief often arises directly through religious experience, reading scripture, or a sense of God's presence. Critics object that any belief might be declared properly basic on this account; Plantinga replies that the conditions for proper basicality are constrained by the deliverances of our cognitive faculties. Can religious experience serve as a source of knowledge?",
  "Theodicy":"If God is all-powerful, all-knowing, and perfectly good, why is there evil and suffering in the world? This is not merely a philosophical puzzle — it is the most personally urgent challenge to religious belief. The logical problem of evil claims that God and evil are simply inconsistent: an omnipotent God could prevent all evil; an omniscient God would know about it; an omnibenevolent God would want to prevent it; yet evil exists. Leibniz's optimism: this is the best possible world — a world with more goodness is not coherently conceivable; evil is the price of the greater goods that require it. Augustine's privation theory: evil is not a positive reality but an absence of good — as blindness is not a thing but the absence of sight. Leibniz's theodicy influenced Voltaire's satirical response in Candide. Can any theodicy adequately respond to the Holocaust?",
  "Free Will Defence":"Perhaps evil exists because God created beings with genuine freedom, and genuine freedom is incompatible with being causally determined to choose only the good. The free will defence, associated with Plantinga and Augustine, argues that a world with free creatures who sometimes choose evil is better than a world of automata who cannot choose otherwise. God could not create free creatures who always freely chose the good: that is a logical impossibility, like making a square circle. But this defence applies most naturally to moral evil — evil caused by human choices. Natural evil — earthquakes, disease, the suffering of animals before humans existed — seems beyond the reach of the free will defence. Does natural evil constitute an independent objection to theism that the free will defence cannot address?",
  "Soul-Making Theodicy":"What if evil is not an anomaly to be explained away but a necessary condition for spiritual growth and moral development? Irenaeus proposed that human beings are not created perfect but are created in God's image and are meant to grow into his likeness through struggle. Hick's 'soul-making theodicy' develops this: God's purpose is not to create a comfortable hedonistic paradise but to make genuine moral agents, and that requires a world with real adversity, real suffering, and real temptation. Virtues like courage, compassion, and perseverance cannot be developed in the absence of the evils they respond to. The world is not a pleasure garden but a vale of soul-making. But does this explain the extreme suffering of innocents — children dying of cancer, the tortured — whose suffering seems to serve no developmental purpose? Does the quantity of evil outrun what soul-making requires?",
};

// Build reverse map: topicId → philosopher IDs
const topicToPhils = {};
Object.entries(PHILOSOPHER_TOPICS).forEach(([philId,tags])=>{
  tags.forEach(tag=>{
    const tid=TOPIC_NAME_TO_ID[tag];
    if(tid){ if(!topicToPhils[tid]) topicToPhils[tid]=[]; topicToPhils[tid].push(philId); }
  });

let twBuilt=false, twSelectedId=null, twLinkSel=null, twNodeSel=null;
let twPinnedId=null, twPinnedType=null; // tracks the currently selected node for pin-open logic
const twSvg=d3.select("#topic-graph");
const twG=twSvg.append("g");
const twZoom=d3.zoom().scaleExtent([0.2,4]).on("zoom",e=>twG.attr("transform",e.transform));
twSvg.call(twZoom);

let twCx=0, twCy=0, twTopicR=0;

function buildTopicWeb(){
  if(twBuilt) return; twBuilt=true;
  const TW=window.innerWidth, TH=window.innerHeight;
  twSvg.attr("width",TW).attr("height",TH);
  const cx=TW/2, cy=TH/2;
  const topicR=Math.min(TW,TH)*0.30;
  const subDist=topicR*0.52;
  const debDist=subDist*0.55;
  twCx=cx; twCy=cy; twTopicR=topicR;

  const nodes=[], links=[];
  TOPIC_TREE.forEach((topic,ti)=>{
    const angle=(ti/TOPIC_TREE.length)*2*Math.PI-Math.PI/2;
    const tx=cx+topicR*Math.cos(angle), ty=cy+topicR*Math.sin(angle);
    nodes.push({id:topic.id,label:topic.label,color:topic.color,type:"topic",x:tx,y:ty,data:topic});
    // center → topic links
    links.push({source:{x:cx,y:cy},target:{x:tx,y:ty},type:"center-topic",color:topic.color});
    // Each topic owns a sector of 2π/nTopics; clamp all children to 80% of half-sector
    const halfSector=Math.PI/TOPIC_TREE.length*0.82;
    topic.subs.forEach((sub,si)=>{
      const nS=topic.subs.length;
      const spread=nS>1?Math.PI*0.30:0;
      const sa=angle+(si-(nS-1)/2)*spread/Math.max(nS-1,1);
      const sx=tx+subDist*Math.cos(sa), sy=ty+subDist*Math.sin(sa);
      nodes.push({id:sub.id,label:sub.label,color:topic.color,type:"sub",x:sx,y:sy,ox:sx,oy:sy,data:sub,topicId:topic.id});
      links.push({source:topic.id,target:sub.id,type:"topic-sub"});
      sub.debates.forEach((deb,di)=>{
        const nD=sub.debates.length;
        // Spread debates radially along the sub's direction + tiny perpendicular offset
        const perpX=-Math.sin(sa), perpY=Math.cos(sa);
        const perpOff=(di-(nD-1)/2)*20;
        // Also clamp angle so debates stay within topic sector
        const rawAngle=sa;
        const clampedA=Math.max(angle-halfSector,Math.min(angle+halfSector,rawAngle));
        const did=sub.id+"-d"+di;
        const dx=sx+debDist*Math.cos(clampedA)+perpOff*perpX;
        const dy=sy+debDist*Math.sin(clampedA)+perpOff*perpY;
        nodes.push({id:did,label:deb,color:topic.color,type:"debate",x:dx,y:dy,ox:dx,oy:dy,data:deb,topicId:topic.id,subId:sub.id});
        links.push({source:sub.id,target:did,type:"sub-debate"});
      });
    });
  });

  const nodeMap=new Map(nodes.map(n=>[n.id,n]));
  // center-topic links already have raw x/y; only resolve id-based links
  const linkObjs=links.map(l=>{
    if(l.type==="center-topic") return l;
    return {...l,source:nodeMap.get(l.source),target:nodeMap.get(l.target)};
  });

  // Draw all links (center-topic rendered first so they appear behind nodes)
  twLinkSel=twG.append("g").selectAll("line").data(linkObjs).enter().append("line")
    .attr("class",l=>l.type==="center-topic"?"tw-link-center":"tw-link"+(l.type==="sub-debate"?" sub":""))
    .style("stroke",l=>l.type==="center-topic"?l.color:l.source.color)
    .style("stroke-opacity",l=>l.type==="center-topic"?1:l.type==="topic-sub"?0.6:0.4)
    .style("stroke-width",l=>l.type==="center-topic"?"2px":null)
    .attr("x1",l=>l.source.x).attr("y1",l=>l.source.y)
    .attr("x2",l=>l.target.x).attr("y2",l=>l.target.y);

  // Center glow ring
  twG.append("circle").attr("cx",cx).attr("cy",cy).attr("r",28)
    .attr("fill","#ffffff").attr("stroke","#ffffff").attr("stroke-width",1.8);
  twG.append("text").attr("x",cx).attr("y",cy+5).attr("text-anchor","middle")
    .attr("font-size","11px").attr("font-family","Georgia,serif").attr("fill","#000000").text("Topics");

  const tooltip=d3.select("#tooltip");

  const twNode=twG.append("g").selectAll(".tw-node").data(nodes).enter().append("g")
    .attr("class","tw-node").attr("transform",d=>`translate(${d.x},${d.y})`)
    .on("click",(e,d)=>{ e.stopPropagation(); selectTwNode(d); })
    .on("mouseenter",(e,d)=>{
      // Reveal this sub's debate labels, or show tooltip for debate nodes
      if(d.type==="sub"){
        twG.selectAll(".tw-node").filter(n=>n.subId===d.id)
          .select("text").attr("opacity",1);
        const html=`<strong style="color:${d.color}">${d.label}</strong><br><span style="opacity:0.8">${d.data.desc||""}</span>`;
        tooltip.style("opacity",1).html(html);
      } else if(d.type==="debate"){
        d3.select(e.currentTarget).select("text").attr("opacity",1);
        const desc=DEBATE_DESC[d.label]||"";
        const html=`<strong style="color:${d.color}">${d.label}</strong>${desc?`<br><span style="opacity:0.8">${desc}</span>`:""}`;
        tooltip.style("opacity",1).html(html);
      }
    })
    .on("mousemove",(e)=>{
      tooltip.style("left",(e.clientX+16)+"px").style("top",(e.clientY-12)+"px");
    })
    .on("mouseleave",(e,d)=>{
      tooltip.style("opacity",0);
      // Only hide labels that aren't pinned by the current selection
      if(d.type==="sub"){
        const isPinned = twPinnedType==="topic"&&d.topicId===twPinnedId ||
                         twPinnedType==="sub"  &&d.id===twPinnedId;
        if(!isPinned){
          twG.selectAll(".tw-node").filter(n=>n.subId===d.id)
            .select("text").attr("opacity",0);
        }
      } else if(d.type==="debate"){
        const isPinned = twPinnedType==="topic"  &&d.topicId===twPinnedId ||
                         twPinnedType==="sub"    &&d.subId===twPinnedId ||
                         twPinnedType==="debate" &&d.id===twPinnedId;
        if(!isPinned) d3.select(e.currentTarget).select("text").attr("opacity",0);
      }
    });

  twNode.append("circle")
    .attr("r",d=>d.type==="topic"?22:d.type==="sub"?13:8)
    .attr("fill",d=>d.color+(d.type==="topic"?"bb":d.type==="sub"?"66":"55"))
    .attr("stroke",d=>d.color)
    .attr("stroke-width",d=>d.type==="topic"?1.8:d.type==="sub"?1:0.8)
    .attr("stroke-opacity",d=>d.type==="topic"?0.7:0.5);

  // Labels: always visible for topic/sub nodes; hidden at rest for debate nodes (revealed on hover)
  twNode.append("text").attr("class","tw-label")
    .attr("text-anchor","middle")
    .attr("dy",d=>d.type==="topic"?-(22+8):d.type==="sub"?-(13+7):-(8+7))
    .attr("font-size",d=>d.type==="topic"?"12px":d.type==="sub"?"10px":"10px")
    .attr("font-family","Georgia,serif")
    .attr("fill",d=>d.type==="topic"?d.color:d.type==="sub"?"rgba(200,200,220,0.80)":"rgba(220,220,240,0.90)")
    .attr("paint-order","stroke")
    .attr("stroke","rgba(8,8,20,0.85)")
    .attr("stroke-width","3px")
    .attr("opacity",d=>d.type==="debate"?0:1)
    .text(d=>{
      if(d.type==="topic") return d.label;
      if(d.label.length>22) return d.label.slice(0,20)+"…";
      return d.label;
    });

  twNodeSel=twNode;
  twSvg.on("click",(e)=>{ if(!e.target.closest(".tw-node")) closeTwSidebar(); });
}

const EXPAND_FACTOR = 2.0; // how much further subs/debates spread on topic zoom

function expandTopicCluster(topicNode){
  if(!twNodeSel||!twLinkSel) return;
  // Use topicNode.x/y as origin (topic nodes don't move, so ox/oy aren't stored on them)
  const tox=topicNode.x, toy=topicNode.y;
  // Fade out all nodes not in this topic (named transition so it doesn't interrupt the move)
  twNodeSel.transition("fade").duration(450)
    .attr("opacity",n=>{
      if(n.type==="topic") return n.id===topicNode.id?1:0;
      return n.topicId===topicNode.id?1:0;
    });
  // Move subs/debates to expanded positions (named transition runs concurrently with fade)
  twNodeSel.filter(n=>(n.type==="sub"||n.type==="debate")&&n.topicId===topicNode.id)
    .each(n=>{
      n.x=tox+(n.ox-tox)*EXPAND_FACTOR;
      n.y=toy+(n.oy-toy)*EXPAND_FACTOR;
    })
    .transition("move").duration(550).ease(d3.easeCubicInOut)
    .attr("transform",n=>`translate(${n.x},${n.y})`);
  // Update link endpoints to follow
  twLinkSel.transition("move").duration(550).ease(d3.easeCubicInOut)
    .attr("x1",l=>l.source.x).attr("y1",l=>l.source.y)
    .attr("x2",l=>l.target.x).attr("y2",l=>l.target.y);
}

function collapseTopicCluster(){
  if(!twNodeSel||!twLinkSel) return;
  // Restore all nodes (named transitions run concurrently)
  twNodeSel.transition("fade").duration(400).attr("opacity",1);
  // Restore original positions
  twNodeSel.filter(n=>n.type==="sub"||n.type==="debate")
    .each(n=>{ n.x=n.ox; n.y=n.oy; })
    .transition("move").duration(480).ease(d3.easeCubicInOut)
    .attr("transform",n=>`translate(${n.x},${n.y})`);
  // Restore link endpoints
  twLinkSel.transition("move").duration(480).ease(d3.easeCubicInOut)
    .attr("x1",l=>l.source.x).attr("y1",l=>l.source.y)
    .attr("x2",l=>l.target.x).attr("y2",l=>l.target.y);
}


function resetTwPath(){
  if(!twLinkSel) return;
  twLinkSel
    .style("stroke-width",l=>l.type==="center-topic"?"2px":null)
    .style("stroke-opacity",l=>l.type==="center-topic"?1:l.type==="topic-sub"?0.6:0.4)
    .style("stroke",l=>l.type==="center-topic"?l.color:l.source.color);
}

function zoomToTwNode(cx, cy, scale){
  const TW=window.innerWidth, TH=window.innerHeight;
  const sidebarW=360;
  // Center the cluster in the visible canvas (left of sidebar)
  const tx=(TW-sidebarW)/2 - scale*cx;
  const ty=TH/2 - scale*cy;
  twSvg.transition().duration(600).ease(d3.easeCubicInOut)
    .call(twZoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

function resetTwZoom(){
  twSvg.transition().duration(500).ease(d3.easeCubicInOut)
    .call(twZoom.transform, d3.zoomIdentity);
}

function selectTwNode(d){
  twPinnedId=d.id; twPinnedType=d.type;
  twG.selectAll(".tw-node").classed("tw-selected",n=>n.id===d.id);
  // Reveal debate labels for the selected sub/topic; hide others
  twG.selectAll(".tw-node").select("text")
    .attr("opacity",n=>{
      if(n.type!=="debate") return 1;
      if(d.type==="sub"   && n.subId===d.id)    return 1;
      if(d.type==="debate"&& n.subId===d.subId) return 1;
      if(d.type==="topic" && n.topicId===d.id)  return 1;
      return 0;
    });
  // Debate clicks: just update the sidebar — no zoom or position change
  if(d.type==="debate"){
    const topicData=TOPIC_TREE.find(t=>t.id===d.topicId);
    if(topicData) fillTopicSidebar(topicData, d);
    return;
  }
  // Find parent topic node datum and expand cluster (mutates n.x/n.y on cluster members)
  const parentTopicNode=twNodeSel?twNodeSel.data().find(n=>n.id===(d.topicId||d.id)&&n.type==="topic"):null;
  if(parentTopicNode) expandTopicCluster(parentTopicNode);
  // Zoom to the bounding-box centre of the relevant cluster so nothing is clipped by the sidebar
  if(!twNodeSel) return;
  const allNodes=twNodeSel.data();
  let clusterMembers, scale;
  if(d.type==="topic"){
    clusterMembers=allNodes.filter(n=>n.id===d.id||n.topicId===d.id);
    scale=1.4;
  } else {
    clusterMembers=allNodes.filter(n=>n.id===d.id||n.subId===d.id);
    scale=3.0;
  }
  const xs=clusterMembers.map(n=>n.x), ys=clusterMembers.map(n=>n.y);
  const bcx=(Math.min(...xs)+Math.max(...xs))/2;
  const bcy=(Math.min(...ys)+Math.max(...ys))/2;
  zoomToTwNode(bcx, bcy, scale);
  const topicData=TOPIC_TREE.find(t=>t.id===d.topicId||t.id===d.id);
  if(!topicData) return;
  fillTopicSidebar(topicData, d);
}

function fillTopicSidebar(topicData, clickedNode){
  twSelectedId=topicData.id;
  const color=topicData.color;

  // Determine title and description based on what was clicked
  let titleText, descText, debates=[];
  if(clickedNode.type==="debate"){
    titleText=clickedNode.label;
    descText=DEBATE_DESC[clickedNode.label]||"";
    debates=[clickedNode.label];
  } else if(clickedNode.type==="sub"){
    titleText=clickedNode.data.label;
    descText=clickedNode.data.desc||"";
    debates=clickedNode.data.debates||[];
  } else {
    // topic node — show overview
    titleText=topicData.label;
    descText=topicData.overview;
    topicData.subs.forEach(s=>s.debates.forEach(d=>debates.push(d)));
  }

  document.getElementById("topic-title").textContent=titleText;
  const badge=document.getElementById("topic-badge");
  // badge always shows parent topic
  badge.textContent=topicData.label;
  badge.style.cssText=`background:${color}22;color:${color};border:1px solid ${color}44`;
  document.getElementById("topic-overview").textContent=descText;
  document.getElementById("topic-debate-list").innerHTML=debates.map(d=>`<li>${d}</li>`).join("");

  // Philosophers: debate → per-debate list; sub → per-subtopic list; topic → broad list
  let philIds;
  if(clickedNode.type==="debate"){
    philIds=DEBATE_PHILS[clickedNode.label]||SUB_PHILS[clickedNode.subId]||topicToPhils[topicData.id]||[];
  } else if(clickedNode.type==="sub"){
    philIds=SUB_PHILS[clickedNode.id]||topicToPhils[topicData.id]||[];
  } else {
    philIds=topicToPhils[topicData.id]||[];
  }
  // Filter to only IDs that exist in the philosopher map
  philIds=philIds.filter(id=>philosopherMap.has(id));
  const philDiv=document.getElementById("topic-philosophers");
  if(!philIds.length){ philDiv.innerHTML='<span class="none-text">None tagged</span>'; }
  else {
    philDiv.innerHTML=`<div class="rel-tags">${philIds.map(id=>{
      const p=philosopherMap.get(id); if(!p) return "";
      const c=SCHOOLS[p.school]?.color||"#888";
      return `<span class="tw-phil-tag" style="background:${c}1a;color:${c};border:1px solid ${c}40" onclick="goToPhilosopher('${id}')">${p.name}</span>`;
    }).join("")}</div>`;
  }
  document.getElementById("topic-sidebar").classList.add("open");
}

function closeTwSidebar(){
  document.getElementById("topic-sidebar").classList.remove("open");
  twG.selectAll(".tw-node").classed("tw-selected",false);
  twG.selectAll(".tw-node").select("text").attr("opacity",n=>n.type==="debate"?0:1);
  twSelectedId=null; twPinnedId=null; twPinnedType=null;
  collapseTopicCluster();
  resetTwPath();
  resetTwZoom();
}

document.getElementById("topic-sidebar-close").addEventListener("click",closeTwSidebar);

window.goToPhilosopher=function(id){
  switchTab("network");
  setTimeout(()=>jumpTo(id),100);
};

window.showTopicWeb=function(topicTag){
  switchTab("topics");
  const tid=TOPIC_NAME_TO_ID[topicTag];
  if(!tid) return;
  const topicData=TOPIC_TREE.find(t=>t.id===tid);
  if(topicData) setTimeout(()=>{
    const fakeNode={id:tid,type:"topic",topicId:tid};
    selectTwNode(fakeNode);
  },120);
};

// ─── TAB SWITCHING ───────────────────────────────────────────────────────────

function switchTab(tab){
  const isNetwork=tab==="network";
  document.getElementById("tab-btn-network").classList.toggle("active",isNetwork);
  document.getElementById("tab-btn-topics").classList.toggle("active",!isNetwork);
  document.getElementById("graph-container").style.display=isNetwork?"block":"none";
  document.getElementById("topic-web-container").style.display=isNetwork?"none":"block";
  document.getElementById("legend").style.display=isNetwork?"":"none";
  document.getElementById("timeline").style.display=isNetwork?"":"none";
  document.getElementById("pathfinder-wrap").style.display=isNetwork?"":"none";
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("topic-sidebar").classList.remove("open");
  if(!isNetwork){ buildTopicWeb(); }
}

document.getElementById("tab-btn-network").addEventListener("click",()=>switchTab("network"));
document.getElementById("tab-btn-topics").addEventListener("click",()=>switchTab("topics"));

// ─── TIMELINE SCRUBBER ───────────────────────────────────────────────────────

(function(){
  const tlMin=document.getElementById("tl-min");
  const tlMax=document.getElementById("tl-max");
  const tlFill=document.getElementById("tl-fill");
  const tlYears=document.getElementById("timeline-years");
  const range=document.getElementById("timeline-range");

  function formatYear(y){ return y<0?`${Math.abs(y)} BCE`:`${y} CE`; }

  function updateFill(){
    const total=1990-(-650);
    const lo=(+tlMin.value-(-650))/total*100;
    const hi=(+tlMax.value-(-650))/total*100;
    tlFill.style.left=lo+"%";
    tlFill.style.width=(hi-lo)+"%";
    tlYears.textContent=`${formatYear(+tlMin.value)} – ${formatYear(+tlMax.value)}`;
  }

  function applyFilter(){
    const lo=+tlMin.value, hi=+tlMax.value;
    const visible=new Set(philosophers.filter(p=>p.born>=lo&&p.born<=hi).map(p=>p.id));
    nodeSel.style("display",d=>visible.has(d.id)?"":"none");
    linkSel.style("display",d=>{
      const s=typeof d.source==="object"?d.source.id:d.source;
      const t=typeof d.target==="object"?d.target.id:d.target;
      return visible.has(s)&&visible.has(t)?"":"none";
    });
  }

  tlMin.addEventListener("input",()=>{
    if(+tlMin.value>+tlMax.value) tlMin.value=tlMax.value;
    updateFill(); applyFilter();
  });
  tlMax.addEventListener("input",()=>{
    if(+tlMax.value<+tlMin.value) tlMax.value=tlMin.value;
    updateFill(); applyFilter();
  });

  updateFill();
})();

// ─── PATH FINDER ─────────────────────────────────────────────────────────────

(function(){
  const btn=document.getElementById("pathfinder-btn");
  const hint=document.getElementById("pathfinder-hint");
  const clearBtn=document.getElementById("pathfinder-clear");
  let pfActive=false, pfSource=null, pfTarget=null;
  let pathEdgeSet=new Set(), pathNodeSet=new Set();

  // Bidirectional (undirected) BFS — order of selection doesn't matter
  // Directed BFS: only follows outgoing edges
  function bfsDirected(fromId,toId){
    if(fromId===toId) return [fromId];
    const visited=new Map([[fromId,null]]);
    const queue=[fromId];
    outer: while(queue.length){
      const cur=queue.shift();
      for(const nb of (outgoing.get(cur)||[])){
        if(!visited.has(nb)){
          visited.set(nb,cur);
          if(nb===toId) break outer;
          queue.push(nb);
        }
      }
    }
    if(!visited.has(toId)) return null;
    const path=[]; let c=toId;
    while(c!==null){path.unshift(c);c=visited.get(c);}
    return path;
  }

  // Try directed A→B; if none, try directed B→A (and note the reversal)
  function bfs(fromId,toId){
    const fwd=bfsDirected(fromId,toId);
    if(fwd) return {path:fwd,reversed:false};
    const rev=bfsDirected(toId,fromId);
    if(rev) return {path:rev,reversed:true};
    return null;
  }

  function highlightPath(path){
    pathNodeSet=new Set(path);
    pathEdgeSet=new Set();
    // store both directions so arrows in either direction are highlighted
    for(let i=0;i<path.length-1;i++){
      pathEdgeSet.add(path[i]+"|"+path[i+1]);
      pathEdgeSet.add(path[i+1]+"|"+path[i]);
    }
    nodeSel.classed("dimmed",false).classed("selected",false);
    nodeSel.select("circle")
      .attr("r",d=>pathNodeSet.has(d.id)?nr(d.id)*1.35:nr(d.id))
      .attr("fill-opacity",d=>pathNodeSet.has(d.id)?1:0.06)
      .attr("stroke-opacity",d=>pathNodeSet.has(d.id)?0.95:0.04)
      .attr("stroke-width",d=>(d.id===pfSource||d.id===pfTarget)?3:1.5);
    nodeSel.select("text").attr("opacity",d=>pathNodeSet.has(d.id)?1:0.04);
    linkSel
      .attr("stroke-opacity",l=>{
        const s=typeof l.source==="object"?l.source.id:l.source;
        const t=typeof l.target==="object"?l.target.id:l.target;
        return pathEdgeSet.has(s+"|"+t)?0.95:0.015;
      })
      .attr("stroke-width",l=>{
        const s=typeof l.source==="object"?l.source.id:l.source;
        const t=typeof l.target==="object"?l.target.id:l.target;
        return pathEdgeSet.has(s+"|"+t)?2.8:1;
      });
  }

  function resetHighlight(){
    pathNodeSet=new Set(); pathEdgeSet=new Set();
    nodeSel.classed("dimmed",false).classed("selected",false);
    nodeSel.select("circle")
      .attr("r",d=>nr(d.id))
      .attr("fill-opacity",0.82)
      .attr("stroke-opacity",0.45)
      .attr("stroke-width",2);
    nodeSel.select("text").attr("opacity",1);
    linkSel.attr("stroke-opacity",0.28).attr("stroke-width",1.4);
  }

  function setHint(txt){ hint.textContent=txt; hint.style.display=txt?"block":"none"; }

  btn.addEventListener("click",()=>{
    pfActive=!pfActive;
    btn.classList.toggle("active",pfActive);
    if(pfActive){
      pfSource=null; pfTarget=null;
      setHint("Click a philosopher to set start");
      clearBtn.style.display="inline";
    } else {
      pfSource=null; pfTarget=null;
      setHint("");
      clearBtn.style.display="none";
      resetHighlight();
    }
  });

  clearBtn.addEventListener("click",()=>{
    pfSource=null; pfTarget=null;
    setHint("Click a philosopher to set start");
    resetHighlight();
  });

  // Intercept node clicks when path finder is active
  const origSelectNode=selectNode;
  selectNode=function(d){
    if(!pfActive){ origSelectNode(d); return; }
    if(!pfSource){
      pfSource=d.id;
      setHint(`Start: ${d.name}\nClick destination`);
      nodeSel.select("circle")
        .attr("stroke-width",n=>n.id===pfSource?3.5:2)
        .attr("stroke-opacity",n=>n.id===pfSource?1:0.35);
    } else if(!pfTarget){
      pfTarget=d.id;
      const result=bfs(pfSource,pfTarget);
      if(result){
        const {path,reversed}=result;
        highlightPath(path);
        const names=path.map(id=>philosopherMap.get(id)?.name||id);
        const arrow=reversed?"↩ reversed: ":"";
        setHint(`${arrow}Path (${path.length-1} step${path.length>2?"s":""}): ${names.join(" → ")}`);
      } else {
        setHint(`No path between ${philosopherMap.get(pfSource)?.name} and ${d.name}`);
        pfTarget=null;
      }
    } else {
      // start over with new source
      pfSource=d.id; pfTarget=null;
      resetHighlight();
      setHint(`Start: ${d.name}\nClick destination`);
      nodeSel.select("circle")
        .attr("stroke-width",n=>n.id===pfSource?3.5:2)
        .attr("stroke-opacity",n=>n.id===pfSource?1:0.35);
    }
  };
})();
</script>
